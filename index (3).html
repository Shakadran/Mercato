/* ---------- helpers ---------- */
const fmtM = v => {
  const m = v / 1e6;
  const s = Math.abs(m) >= 100 ? m.toFixed(0) : (Math.round(m * 10) / 10).toString();
  return "€" + s + "M";
};
const annual = p =>
  p.zone === "exit"
    ? (p.exit?.mode === "loan" ? p.amort + p.salary * (1 - (p.exit.coverage ?? 100) / 100) : 0)
    : p.amort + p.salary;

// cost → color: green (cheap) → amber → red (expensive), based on annual cost
const costColor = a => {
  const t = Math.min(1, Math.max(0, (a - 2_000_000) / (18_000_000 - 2_000_000)));
  // green 150 → red 0 in hue
  const hue = 145 - t * 145;
  return `hsl(${hue}, 62%, 46%)`;
};

/* ===================== drag ===================== */
function useDrag(onDrop, onTap) {
  const [dragId] = useState(null);
  // drag-to-sell was removed; every press on a chip is a tap that opens the popover.
  const start = (id, e) => {
    const px = e.touches ? e.touches[0].clientX : e.clientX;
    const py = e.touches ? e.touches[0].clientY : e.clientY;
    onTap?.(id, { x: px, y: py });
  };
  return { dragId, start };
}

/* Fixed grid of 11 position cells in a 3-5-2. Each cell holds its starter
   on top and its backups stacked below — no free coordinates, no overlap.
   Grid columns 1..5, rows for ATT / MID / WB+DEF / GK. */
const CELLS = [
  { key: "ST2", pos: "ST", col: 2, row: 1 }, { key: "ST1", pos: "ST", col: 4, row: 1 },
  { key: "LWB", pos: "LWB", col: 1, row: 2 }, { key: "LM", pos: "LM", col: 2, row: 2 },
  { key: "CM_DM", pos: "MIDC", col: 3, row: 2 }, { key: "RM", pos: "RM", col: 4, row: 2 },
  { key: "RWB", pos: "RWB", col: 5, row: 2 },
  { key: "LCB", pos: "LCB", col: 2, row: 3 }, { key: "CB", pos: "CB", col: 3, row: 3 }, { key: "RCB", pos: "RCB", col: 4, row: 3 },
  { key: "GK", pos: "GK", col: 3, row: 4 },
];
// which exact positions belong to each cell
const CELL_POS = {
  ST2: ["ST"], ST1: ["ST"], LM: ["LM"], RM: ["RM"], CM_DM: ["CM", "DM"],
  LWB: ["LWB"], RWB: ["RWB"], LCB: ["LCB"], CB: ["CB"], RCB: ["RCB"], GK: ["GK"],
};

function layout(players) {
  const onField = players.filter(p => p.zone !== "exit" && !p.tier);
  const starters = onField.filter(p => p.role === "start" && p.spot);
  const bench = onField.filter(p => !(p.role === "start" && p.spot));
  const used = new Set();

  // pass 1: place each cell's starter
  const cells = CELLS.map(cell => {
    let starter = starters.find(s => s.spot === cell.key && !used.has(s.id));
    if (!starter) starter = starters.find(s => CELL_POS[cell.key].includes(s.pos) && !used.has(s.id));
    if (starter) used.add(starter.id);
    return { ...cell, starter, subs: [] };
  });

  // pass 2: distribute bench round-robin across cells that accept that position,
  // so e.g. two ST backups split across the two striker cells.
  const cellsForPos = pos => cells.filter(c => CELL_POS[c.key].includes(pos));
  const rr = {}; // position → next cell index
  bench.forEach(p => {
    const cands = cellsForPos(p.pos);
    if (!cands.length) return;
    const i = (rr[p.pos] = (rr[p.pos] ?? -1) + 1) % cands.length;
    // prefer the least-loaded candidate for balance
    const target = cands.reduce((a, b) => (b.subs.length < a.subs.length ? b : a), cands[i]);
    target.subs.push(p);
    used.add(p.id);
  });

  const leftover = bench.filter(p => !used.has(p.id));
  return leftover.length
    ? cells.concat([{ key: "extra", pos: "", col: 3, row: 4, starter: null, subs: leftover, extra: true }])
    : cells;
}

function Chip({ p, size, dragging, onDown }) {
  const a = annual(p);
  return (
    <div className={"chip " + size + (dragging ? " drag" : "")}
      role="button" tabIndex={0}
      onClick={e => onDown(p.id, e)}
      onKeyDown={e => (e.key === "Enter" || e.key === " ") && onDown(p.id, e)}>
      <span className="nm">
        {(p.signed || p.newSigning) && <span className="flag star" title="Signed">★</span>}
        {p.name}
      </span>
      <span className="amt" style={{ color: costColor(a) }}>{fmtM(a)}</span>
    </div>
  );
}

/* ===================== SELL modal ===================== */
function SellModal({ players, onClose, onApply, onCheck }) {
  // senior squad, costliest first — the biggest saving at the top.
  const avail = players.filter(p => p.zone !== "exit");
  const seniors = avail.filter(p => !p.tier).sort((a, b) => annual(b) - annual(a));
  // youth: sorted by market value — the sale is near-pure profit, so value is what matters.
  const youth = avail.filter(p => p.tier).sort((a, b) => (b.value || 0) - (a.value || 0));
  const [youthOpen, setYouthOpen] = useState(false);
  const [sel, setSel] = useState(null);
  const [mode, setMode] = useState("sell");
  const [price, setPrice] = useState("");
  const [clubs, setClubs] = useState([]);
  const [cov, setCov] = useState(100);
  const [checking, setChecking] = useState(false);
  const [live, setLive] = useState(null);

  const pick = p => {
    setSel(p); setMode("sell");
    const link = talkFor(p);
    setPrice(link ? link.price / 1e6 : (p.value ? p.value / 1e6 : ""));
    setClubs(link ? [...link.clubs] : []);
    setLive(null);
  };
  // price + clubs come from the daily feed, not a live call
  const runCheck = () => {
    const l = talkFor(sel);
    if (l) {
      if (l.price) setPrice(l.price / 1e6);
      if (l.clubs?.length) setClubs(l.clubs);
      setLive({ note: l.talk });
    } else {
      setLive({ note: "No reported price in today's feed — enter your own figure." });
    }
  };
  const link = sel && talkFor(sel);
  const dev = link && price ? (price * 1e6 - link.price) / link.price : 0;

  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet" onClick={e => e.stopPropagation()}>
        <button className="close" onClick={onClose}>✕</button>
        <h3>Sell or loan a player</h3>
        <div className="sub">Senior squad sorted by annual saving, costliest first. Academy players carry almost no book value, so selling them is nearly pure profit — cash in, without touching the cost cap.</div>

        {!sel ? (
          <div className="plist">
            <div className="listlabel">First team</div>
            {seniors.map(p => (
              <button className="prow" key={p.id} onClick={() => pick(p)}>
                <span className="dot" style={{ background: costColor(annual(p)) }} />
                <span style={{ minWidth: 0 }}>
                  <span className="nm">{p.name}</span><br />
                  <span className="meta">
                    {POS[p.pos]} · {p.age}
                    {contractOf(p) ? ` · until ${contractOf(p)}` : ""}
                    {p.value ? ` · worth ~${fmtM(p.value)}` : ""}
                    {p.exiting ? " · listed to leave" : talkFor(p) ? " · has interest" : ""}
                  </span>
                </span>
                <span className="r" style={{ textAlign: "end" }}>
                  {fmtM(annual(p))}<span className="meta"> /yr</span>
                </span>
              </button>
            ))}

            {youth.length > 0 && (() => {
              const hot = youth.filter(p => talkFor(p));
              const rest = youth.filter(p => !talkFor(p));
              const YRow = p => (
                <button className="prow" key={p.id} onClick={() => pick(p)}>
                  <span className="dot" style={{ background: p.tier === "u23" ? "var(--blue2)" : "#6E43C4" }} />
                  <span style={{ minWidth: 0 }}>
                    <span className="nm">
                      {p.name}
                      <span className={"tier " + p.tier}>{p.tier === "u23" ? "U23" : "Primavera"}</span>
                    </span><br />
                    <span className="meta">
                      {POS[p.pos]} · {p.age}
                      {talkFor(p)?.clubs?.length ? " · " + talkFor(p).clubs.join(", ") : ""}
                    </span>
                  </span>
                  <span className="r" style={{ textAlign: "end" }}>
                    ~{fmtM(p.value || 0)}<span className="meta"> value</span>
                  </span>
                </button>
              );
              return (
                <div className="dropdown">
                  <button className="dd-head" onClick={() => setYouthOpen(o => !o)}>
                    <span>
                      <span className="dd-title">Academy · U23 &amp; Primavera</span>
                      <span className="dd-sub">{youth.length} players · {hot.length} with active interest · sale is near-pure profit</span>
                    </span>
                    <span className={"dd-arrow" + (youthOpen ? " open" : "")}>›</span>
                  </button>
                  {youthOpen && (
                    <div className="dd-body">
                      {hot.length > 0 && <>
                        <div className="dd-tab hot">Transfer talk right now</div>
                        {hot.map(YRow)}
                      </>}
                      {rest.length > 0 && <>
                        <div className="dd-tab">Rest of the academy</div>
                        {rest.map(YRow)}
                      </>}
                    </div>
                  )}
                </div>
              );
            })()}
          </div>
        ) : (
          <div>
            <div className="prow" style={{ cursor: "default", marginTop: 12 }}>
              <span className="dot" style={{ background: costColor(annual(sel)) }} />
              <span className="nm">{sel.name}</span>
              <button className="pill" style={{ marginInlineStart: "auto", cursor: "pointer", border: "none" }} onClick={() => setSel(null)}>change</button>
            </div>
            <div className="seg" style={{ marginTop: 14 }}>
              {["sell", "loan"].map(m => <button key={m} className={mode === m ? "on" : ""} onClick={() => setMode(m)}>{m === "sell" ? "Sell" : "Loan out"}</button>)}
            </div>

            {mode === "sell" && (<>
              {clubs.length > 0 && <div className="clubs">
                {clubs.map(c => <button key={c} className={"club on"}>{c}</button>)}
              </div>}
              <div className="fieldrow">
                <div className="f"><label>Fee (€M)</label><input type="number" min="0" step="0.5" value={price} onChange={e => setPrice(e.target.value)} /></div>
                {!link && <div className="f" style={{ justifyContent: "flex-end" }}>
                  <button className="club" onClick={runCheck} disabled={checking}>Check press{checking && <span className="spin dark" />}</button>
                </div>}
              </div>
              {link && price && Math.abs(dev) >= 0.2 && <div className="hint2 warn">Reported ~{fmtM(link.price)} — you're {dev > 0 ? "above" : "below"} by ~{Math.round(Math.abs(dev) * 100)}%.</div>}
              {link && price && Math.abs(dev) < 0.2 && <div className="hint2 ok">In line with reports (~{fmtM(link.price)}).</div>}
              {live?.note && <div className="hint2">{live.note}</div>}
              <button className="cta dngr" disabled={!price} onClick={() => onApply(sel.id, { mode: "sell", fee: price * 1e6, clubs })}>
                Sell for {price ? fmtM(price * 1e6) : "—"}
              </button>
            </>)}

            {mode === "loan" && (<>
              <div className="f" style={{ marginTop: 14 }}>
                <label>Wage covered by receiving club: {cov}%</label>
                <input className="slider" type="range" min="0" max="100" step="10" value={cov} onChange={e => setCov(+e.target.value)} />
              </div>
              <div className="hint2">Inter keeps amortization {fmtM(sel.amort)} + {fmtM(sel.salary * (1 - cov / 100))} wages.</div>
              <button className="cta" onClick={() => onApply(sel.id, { mode: "loan", coverage: cov })}>Loan out</button>
            </>)}
          </div>
        )}
      </div>
    </div>
  );
}

/* ===================== SIGN modal — fully manual ===================== */
function SignModal({ onClose, onShortlist }) {
  const [name, setName] = useState("");
  const [pos, setPos] = useState("CM");
  const [age, setAge] = useState(25);
  const [free, setFree] = useState(false);
  const [fee, setFee] = useState("");
  const [years, setYears] = useState(4);
  const [net, setNet] = useState("");

  const effFee = free ? 0 : (fee || 0) * 1e6;
  const gross = (net || 0) * 1e6 * 1.84;
  const amort = effFee / (years || 1);
  const annualCost = amort + gross;
  const ready = name.trim() && years && net !== "" && (free || fee !== "");

  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet" onClick={e => e.stopPropagation()}>
        <button className="close" onClick={onClose}>✕</button>
        <h3>Sign a player</h3>
        <div className="sub">Name anyone you like and set the terms. The annual cost updates as you type — that's the number the cap actually sees.</div>

        <div className="f" style={{ marginTop: 16 }}>
          <label>Player</label>
          <input value={name} onChange={e => setName(e.target.value)} placeholder="Who are you signing?" autoFocus />
        </div>

        <div className="fieldrow">
          <div className="f">
            <label>Position</label>
            <select value={pos} onChange={e => setPos(e.target.value)}>
              {["GK", "CB", "RWB", "LWB", "DM", "CM", "ST"].map(o => <option key={o} value={o}>{POS[o]}</option>)}
            </select>
          </div>
          <div className="f">
            <label>Age</label>
            <input type="number" min="16" max="40" value={age} onChange={e => setAge(+e.target.value)} />
          </div>
        </div>

        <div className="freerow">
          <label className="check">
            <input type="checkbox" checked={free} onChange={e => { setFree(e.target.checked); if (e.target.checked) setFee(""); }} />
            <span>Free agent — no transfer fee</span>
          </label>
        </div>

        <div className="fieldrow">
          <div className="f">
            <label>Fee (€M){free ? " · free" : ""}</label>
            <input type="number" min="0" step="0.5" value={free ? 0 : fee} disabled={free}
              onChange={e => setFee(e.target.value)} placeholder="30"
              style={free ? { opacity: .5 } : undefined} />
          </div>
          <div className="f">
            <label>Contract (yrs)</label>
            <input type="number" min="1" max="6" value={years} onChange={e => setYears(+e.target.value)} />
          </div>
          <div className="f">
            <label>Net wage (€M/yr)</label>
            <input type="number" min="0" step="0.1" value={net} onChange={e => setNet(e.target.value)} placeholder="3" />
          </div>
        </div>

        {!free && fee !== "" && (
          <div className="hint2 warn" style={{ marginTop: 10 }}>
            <b>Use the base fee, not the fee plus add-ons.</b> Bonuses are contingent — a club only
            capitalises them once they're likely to be paid, or once they're actually triggered. Inter's
            published amortisation runs on the base fee, so that's what the cap sees. Agent commissions
            are left out too.
          </div>
        )}
        <div className="hint2">
          Gross wage {fmtM(gross)} · amortization {fmtM(amort)} · <b>annual cost {fmtM(annualCost)}</b>
          <div style={{ marginTop: 6, opacity: .82 }}>
            {free
              ? `No fee, so nothing to amortise — the €${net || 0}M net becomes €${(gross / 1e6).toFixed(1)}M gross after Italian tax (×1.84), and that gross figure is the whole annual cost.`
              : `The €${fee || 0}M fee spread over ${years} years is €${(amort / 1e6).toFixed(1)}M of amortisation a year. Add the €${net || 0}M net wage — €${(gross / 1e6).toFixed(1)}M gross after tax — and that's what hits the cap.`}
          </div>
        </div>

        <button className="cta" disabled={!ready}
          onClick={() => onShortlist({
            id: "sign_" + Date.now(),
            name: name.trim(), pos, age,
            fee: effFee, years, salary: gross, net: (net || 0) * 1e6,
            free,
            src: free ? "Free agent" : "Signed on your terms",
          })}>
          ＋ Add to shortlist
        </button>
      </div>
    </div>
  );
}

/* ===================== EXTEND modal ===================== */
// Extending: remaining book value spread over MORE years → lower amortization/yr.
// But a new deal usually means a wage rise. We model both.
function ExtendModal({ players, extensions, onClose, onApply }) {
  // remaining contract years drive both the sort and the amortization maths
  const remainOf = p => Math.max(1, ((contractOf(p) || 2028)) - 2026);
  // sorted by contract expiry — the most urgent renewals first
  const eligible = players
    .filter(p => p.zone !== "exit" && p.amort > 0)
    .sort((a, b) => remainOf(a) - remainOf(b) || annual(b) - annual(a));
  const [sel, setSel] = useState(null);
  const [addYears, setAddYears] = useState(2);
  const [raise, setRaise] = useState(10); // % wage rise

  const pick = p => { setSel(p); setAddYears(2); setRaise(10); };

  // remaining book value = amort × years left. Spread it over (left + added) years.
  const baseRemain = sel ? remainOf(sel) : 2;
  const newAmort = sel ? (sel.amort * baseRemain) / (baseRemain + addYears) : 0;
  const newSalary = sel ? sel.salary * (1 + raise / 100) : 0;
  const oldCost = sel ? sel.amort + sel.salary : 0;
  const newCost = newAmort + newSalary;
  const delta = newCost - oldCost;

  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet" onClick={e => e.stopPropagation()}>
        <button className="close" onClick={onClose}>✕</button>
        <h3>Extend a contract</h3>
        <div className="sub">Sorted by expiry — the most urgent first. A longer deal spreads the remaining fee over more years (lower amortization) but usually raises the wage.</div>

        {!sel ? (
          <div className="plist">
            {eligible.map(p => {
              const ext = extensions[p.id];
              const until = contractOf(p);
              const left = remainOf(p);
              const urgent = left <= 1;
              return (
                <button className="prow" key={p.id} onClick={() => pick(p)}>
                  <span className="dot" style={{ background: urgent ? "var(--red)" : costColor(annual(p)) }} />
                  <span style={{ minWidth: 0 }}>
                    <span className="nm">{p.name}{ext ? " ✓" : ""}</span><br />
                    <span className="meta">
                      amort {fmtM(p.amort)} · wage {fmtM(p.salary)}
                    </span>
                  </span>
                  <span className="r" style={{ textAlign: "end" }}>
                    <span style={{ color: urgent ? "var(--red)" : "var(--ink)" }}>
                      {until ? "until " + until : "—"}
                    </span>
                    <br /><span className="meta">{left} yr{left === 1 ? "" : "s"} left</span>
                  </span>
                </button>
              );
            })}
          </div>
        ) : (
          <div>
            <div className="prow" style={{ cursor: "default", marginTop: 12 }}>
              <span className="dot" style={{ background: costColor(annual(sel)) }} />
              <span><span className="nm">{sel.name}</span><br />
                <span className="meta">Contract until {contractOf(sel) || "—"} · {baseRemain} yr{baseRemain === 1 ? "" : "s"} left</span></span>
              <button className="pill" style={{ marginInlineStart: "auto", cursor: "pointer", border: "none" }} onClick={() => setSel(null)}>change</button>
            </div>
            <div className="f" style={{ marginTop: 14 }}>
              <label>Add years: +{addYears} → new expiry {((contractOf(sel) || 2028)) + addYears}</label>
              <input className="slider" type="range" min="1" max="4" step="1" value={addYears} onChange={e => setAddYears(+e.target.value)} />
            </div>
            <div className="f" style={{ marginTop: 10 }}>
              <label>Wage change on new deal: {raise > 0 ? "+" : ""}{raise}%</label>
              <input className="slider" type="range" min="-10" max="40" step="5" value={raise} onChange={e => setRaise(+e.target.value)} />
            </div>
            <div className="hint2">
              Amortization {fmtM(sel.amort)} → <b>{fmtM(newAmort)}</b> · wage {fmtM(sel.salary)} → <b>{fmtM(newSalary)}</b><br />
              Annual cost {fmtM(oldCost)} → <b style={{ color: delta > 0 ? "var(--red)" : "var(--green)" }}>{fmtM(newCost)}</b> ({delta > 0 ? "+" : ""}{fmtM(delta)})
              <div style={{ marginTop: 6, opacity: .82 }}>
                The remaining book value ({fmtM(sel.amort)} × {baseRemain}yr) now spreads over {baseRemain + addYears} years, so amortization drops — but the wage rise{delta > 0 ? " outweighs it" : " doesn't cancel the saving"}.
              </div>
            </div>
            <button className="cta" onClick={() => onApply(sel.id, { amort: newAmort, salary: newSalary, addYears, raise })}>Apply extension</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* status line + info popover for any player */
function statusOf(p) {
  const net = Math.round(p.salary / p.mult / 1e5) / 10;
  const bits = [];
  if (p.signed || p.newSigning) bits.push({ t: p.newSigning ? "Signed by you" : "New signing", c: "var(--gold)", ic: "★" });
  if (p.pending) bits.push({ t: "Not formally done", c: "#E06C34", ic: "!" });
  if (p.tier) bits.push({ t: p.tier === "u23" ? "U23 squad" : "Primavera", c: p.tier === "u23" ? "var(--blue2)" : "#6E43C4", ic: "◎" });
  if (p.zone === "exit") {
    if (p.exit?.mode === "sell") bits.push({ t: "Sold — " + fmtM(p.exit.fee), c: "var(--red)", ic: "→" });
    else if (p.exit?.mode === "loan") bits.push({ t: "Loaned out", c: "var(--blue2)", ic: "→" });
    else bits.push({ t: "Released", c: "var(--red)", ic: "→" });
  }
  return { bits, net };
}

function Popover({ data, viewOnly, onSell, onReturn, onExtend, onClose }) {
  const { player: p } = data;
  const { bits, net } = statusOf(p);
  const [mode, setMode] = useState(null); // null | 'sell' | 'loan' | 'extend'
  const [fee, setFee] = useState(p.value ? p.value / 1e6 : "");
  const [cov, setCov] = useState(100);
  const [addYears, setAddYears] = useState(2);
  const [raise, setRaise] = useState(10);
  const isExiting = p.zone === "exit";

  // extension maths: remaining book value spread over more years
  const remain = Math.max(1, ((contractOf(p) || 2028)) - 2026);
  const newAmort = (p.amort * remain) / (remain + addYears);
  const newSalary = p.salary * (1 + raise / 100);
  const extDelta = (newAmort + newSalary) - (p.amort + p.salary);

  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet pop-sheet" onClick={e => e.stopPropagation()}>
        <button className="close" onClick={onClose}>✕</button>
        <div className="pop-head2">
          <span className="pop-name2">{p.name}</span>
          <span className="pop-pos2">{POS[p.pos]} · age {p.age}</span>
        </div>
        {bits.length > 0 && <div className="pop-status">
          {bits.map((b, i) => <span key={i} className="pop-badge" style={{ color: b.c, borderColor: b.c }}>{b.ic} {b.t}</span>)}
        </div>}
        <div className="pop-rows">
          <div><span>Annual cost</span><b style={{ color: costColor(annual(p)) }}>{fmtM(annual(p))}</b></div>
          <div><span>Amortization</span><b>{fmtM(p.amort)}</b></div>
          <div><span>Wage</span><b>{fmtM(p.salary)} gross · €{net}M net</b></div>
          {(contractOf(p)) ? <div><span>Contract until</span><b>June {contractOf(p)}</b></div> : null}
          {p.value ? <div><span>Market value</span><b>~{fmtM(p.value)}</b></div> : null}
        </div>
        {(() => {
          const link = talkFor(p);
          if (!link && !p.note) return null;
          return (
            <div className="talk">
              <div className="talk-head">
                <span className="talk-title">Transfer talk</span>
                {link?.type && <span className="talk-type" style={{
                  color: link.type === "Not for sale" ? "var(--green)" : link.type === "Listed for sale" ? "#E06C34" : "var(--blue2)",
                  borderColor: link.type === "Not for sale" ? "var(--green)" : link.type === "Listed for sale" ? "#E06C34" : "var(--blue2)",
                }}>{link.type}</span>}
              </div>
              {link?.price ? (
                <div className="talk-price"><span>Reported price</span><b>~{fmtM(link.price)}</b></div>
              ) : null}
              {link?.clubs?.length > 0 && (
                <div className="clubs">{link.clubs.map(c => <span key={c} className="club-tag">{c}</span>)}</div>
              )}
              <div className="talk-body">{link?.talk || p.note}</div>
            </div>
          );
        })()}

        {isExiting ? (
          <div style={{ marginTop: 14 }}>
            <div className="hint2">Currently {p.exit?.mode === "sell" ? "sold for " + fmtM(p.exit.fee) : p.exit?.mode === "loan" ? "loaned out" : "released"}.</div>
            <button className="cta" style={{ background: "var(--ink)" }} onClick={() => onClose(p.id, "undo")}>Keep at the club</button>
          </div>
        ) : p.newSigning ? (
          <div style={{ marginTop: 14 }}>
            <button className="cta" style={{ background: "var(--ink)" }} onClick={() => onReturn(p.id)}>↩ Return to shortlist</button>
            <div className="pop-hint">This player was signed in the simulator — send them back to reconsider.</div>
          </div>
        ) : viewOnly ? null : !mode ? (
          <div className="pop-actions">
            <button className="cta dngr" onClick={() => setMode("sell")}>Sell</button>
            <button className="cta ghost2" onClick={() => setMode("loan")}>Loan</button>
            {p.amort > 0 && <button className="cta" style={{ background: "#6E43C4" }} onClick={() => setMode("extend")}>Extend</button>}
          </div>
        ) : mode === "sell" ? (
          <div style={{ marginTop: 12 }}>
            <div className="f"><label>Sale fee (€M)</label><input type="number" min="0" step="0.5" value={fee} onChange={e => setFee(e.target.value)} autoFocus /></div>
            {p.value && fee && Math.abs((fee * 1e6 - p.value) / p.value) >= 0.2 &&
              <div className="hint2 warn">Market value ~{fmtM(p.value)} — you're {fee * 1e6 > p.value ? "above" : "below"} by ~{Math.round(Math.abs((fee * 1e6 - p.value) / p.value) * 100)}%.</div>}
            <div className="pop-actions">
              <button className="cta dngr" disabled={fee === ""} onClick={() => onSell(p.id, { mode: "sell", fee: fee * 1e6 })}>Confirm sale</button>
              <button className="cta ghost2" onClick={() => setMode(null)}>Back</button>
            </div>
          </div>
        ) : mode === "extend" ? (
          <div style={{ marginTop: 12 }}>
            <div className="f">
              <label>Add years: +{addYears} → contract until June {((contractOf(p) || 2028)) + addYears}</label>
              <input className="slider" type="range" min="1" max="4" step="1" value={addYears} onChange={e => setAddYears(+e.target.value)} />
            </div>
            <div className="f" style={{ marginTop: 8 }}>
              <label>Wage change: {raise > 0 ? "+" : ""}{raise}%</label>
              <input className="slider" type="range" min="-10" max="40" step="5" value={raise} onChange={e => setRaise(+e.target.value)} />
            </div>
            <div className="hint2">
              Amortization {fmtM(p.amort)} → <b>{fmtM(newAmort)}</b> · wage {fmtM(p.salary)} → <b>{fmtM(newSalary)}</b><br />
              Annual cost {fmtM(p.amort + p.salary)} → <b style={{ color: extDelta > 0 ? "var(--red)" : "var(--green)" }}>{fmtM(newAmort + newSalary)}</b> ({extDelta > 0 ? "+" : ""}{fmtM(extDelta)})
            </div>
            <div className="pop-actions">
              <button className="cta" style={{ background: "#6E43C4" }} onClick={() => onExtend(p.id, { amort: newAmort, salary: newSalary, addYears, raise })}>Apply extension</button>
              <button className="cta ghost2" onClick={() => setMode(null)}>Back</button>
            </div>
          </div>
        ) : (
          <div style={{ marginTop: 12 }}>
            <div className="f"><label>Wage covered by receiving club: {cov}%</label>
              <input className="slider" type="range" min="0" max="100" step="10" value={cov} onChange={e => setCov(+e.target.value)} /></div>
            <div className="hint2">Inter keeps amortization {fmtM(p.amort)} + {fmtM(p.salary * (1 - cov / 100))} wages.</div>
            <div className="pop-actions">
              <button className="cta" onClick={() => onSell(p.id, { mode: "loan", coverage: cov })}>Confirm loan</button>
              <button className="cta ghost2" onClick={() => setMode(null)}>Back</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


/* ===================== BREAKDOWN MODALS ===================== */
function CostBreakdown({ players, onClose }) {
  const [sort, setSort] = useState("cost"); // cost | pos | until | age | wage
  const [asc, setAsc] = useState(false);
  const rows = players.filter(p => !p.tier && annual(p) > 0);
  const posRank = { GK: 0, LCB: 1, CB: 2, RCB: 3, LWB: 4, RWB: 5, LM: 6, DM: 7, CM: 8, RM: 9, ST: 10 };
  const val = p => ({
    cost: annual(p), wage: p.salary, amort: p.amort, age: p.age,
    pos: posRank[p.pos] ?? 99, until: (contractOf(p) || 9999),
  }[sort]);
  const sorted = [...rows].sort((a, b) => {
    const d = val(a) - val(b);
    return (asc ? d : -d) || annual(b) - annual(a);
  });
  const total = rows.reduce((s, p) => s + annual(p), 0);
  const head = (key, label) => (
    <th className={sort === key ? "on" : ""} onClick={() => { sort === key ? setAsc(a => !a) : (setSort(key), setAsc(key === "pos" || key === "until" || key === "age")); }}>
      {label}{sort === key ? (asc ? " ↑" : " ↓") : ""}
    </th>
  );

  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet wide" onClick={e => e.stopPropagation()}>
        <button className="close" onClick={onClose}>✕</button>
        <h3>Squad cost breakdown</h3>
        <div className="sub">Annual cost = amortization + gross wage. Total <b>{fmtM(total)}</b> against the {fmtM(CAP)} cap. Tap a column to sort.</div>
        <div className="tbl-wrap">
          <table className="tbl">
            <thead><tr>
              {head("cost", "Player")}
              {head("pos", "Pos")}
              {head("age", "Age")}
              {head("until", "Until")}
              {head("amort", "Amort")}
              {head("wage", "Wage")}
              {head("cost", "Cost/yr")}
            </tr></thead>
            <tbody>
              {sorted.map(p => {
                const a = annual(p);
                const out = p.zone === "exit";
                return (
                  <tr key={p.id} className={out ? "dim" : ""}>
                    <td className="pname">{p.name}{out && <span className="outtag">out</span>}</td>
                    <td className="mut">{POS[p.pos]}</td>
                    <td className="mut">{p.age}</td>
                    <td className="mut">{contractOf(p) || "—"}</td>
                    <td className="num mut">{fmtM(p.amort)}</td>
                    <td className="num mut">{fmtM(p.salary)}</td>
                    <td className="num strong" style={{ color: costColor(a) }}>{fmtM(a)}</td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot><tr>
              <td colSpan={6}>Total · {rows.length} players</td>
              <td className="num strong">{fmtM(total)}</td>
            </tr></tfoot>
          </table>
        </div>
      </div>
    </div>
  );
}

function CashBreakdown({ lines, total, onClose }) {
  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet" onClick={e => e.stopPropagation()}>
        <button className="close" onClick={onClose}>✕</button>
        <h3>Net transfer spend</h3>
        <div className="sub">Money in from sales, money out on fees. Floor is {fmtM(CASH_FLOOR)}.</div>
        <div className="tbl-wrap" style={{ marginTop: 14 }}>
          <table className="tbl">
            <tbody>
              {lines.map((l, i) => (
                <tr key={i}>
                  <td className="pname">{l.name}</td>
                  <td className="mut">{l.detail}</td>
                  <td className="num strong" style={{ color: l.amount >= 0 ? "var(--green)" : "var(--red)" }}>
                    {l.amount >= 0 ? "+" : "−"}{fmtM(Math.abs(l.amount))}
                  </td>
                </tr>
              ))}
              {lines.length === 0 && <tr><td colSpan={3} className="mut" style={{ padding: 14, textAlign: "center" }}>No transfer activity yet.</td></tr>}
            </tbody>
            <tfoot><tr>
              <td colSpan={2}>Net balance</td>
              <td className="num strong" style={{ color: total < CASH_FLOOR ? "var(--red)" : "var(--ink)" }}>
                {total >= 0 ? "+" : "−"}{fmtM(Math.abs(total))}
              </td>
            </tr></tfoot>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   SAVE & SHARE

   A fan's squad is theirs alone — it never touches the cloud. It's kept in
   this browser so closing the tab doesn't throw the work away, and it can be
   folded into a URL so they can send it to someone.

   The link carries only what the fan changed (sold, signed, extended), not the
   whole squad — the base squad comes from squad.json at the other end. That
   keeps the URL short enough to paste into a message.
   ============================================================ */
const SAVE_KEY = "mercato.squad.v1";

const encodeState = st => {
  try {
    const json = JSON.stringify(st);
    return btoa(unescape(encodeURIComponent(json)))
      .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  } catch { return ""; }
};
const decodeState = s => {
  try {
    const b = s.replace(/-/g, "+").replace(/_/g, "/");
    return JSON.parse(decodeURIComponent(escape(atob(b))));
  } catch { return null; }
};

/* everything the fan changed, and nothing else */
const packState = ({ players, signed, extensions, ledger, name }) => ({
  n: name || "",
  x: players.filter(p => p.zone === "exit").map(p => ({
    i: p.id, m: p.exit?.mode, f: p.exit?.fee || 0, c: p.exit?.coverage,
  })),
  s: Object.entries(signed).map(([id, v]) => ({
    i: id, n: v.name, p: v.pos, a: v.age || 25, f: v.fee, y: v.years, w: v.salary,
  })),
  e: Object.entries(extensions).map(([id, v]) => ({ i: id, a: v.amort, w: v.salary, y: v.addYears })),
});

function Splash({ onPlay }) {
  const [method, setMethod] = useState(false);
  return (
    <div className="splash">
      <div className="sp-photo">
        <img src={DIRECTORS} alt="Beppe Marotta" />
      </div>
      <div className="sp-body">
        <h1>Build the Nerazzurri</h1>
        <p>
          Marotta and Ausilio have to build next season's Inter without breaking the club.
          Every player costs two things — the annual amortisation of his transfer fee, spread across
          the years of his contract, and his wage. Sell, sign, extend, and see whether the books still balance.
        </p>
        <button className="sp-play" onClick={onPlay}>Play</button>
        <button className="sp-method" onClick={() => setMethod(true)}>How the numbers work</button>

      {method && <MethodModal onClose={() => setMethod(false)} />}
    </div>
  );
}

/* ===================== METHOD ===================== */
function MethodModal({ onClose }) {
  const [open, setOpen] = useState("cost");
  const Row = ({ id, q, children }) => (
    <div className={"acc" + (open === id ? " on" : "")}>
      <button className="acc-q" onClick={() => setOpen(open === id ? "" : id)}>
        <span>{q}</span><span className="acc-x">{open === id ? "−" : "+"}</span>
      </button>
      {open === id && <div className="acc-a">{children}</div>}
    </div>
  );

  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet wide" onClick={e => e.stopPropagation()}>
        <button className="close" onClick={onClose}>✕</button>
        <h3>How the numbers work</h3>
        <div className="sub">Every figure here is either published or derived from a published one. If someone tells you a number looks wrong, this is where to check.</div>

        <div className="method">
          <Row id="cost" q="What does a player actually cost?">
            <p><b>Annual cost = amortisation + gross wage.</b> Not the transfer fee — that's cash, and it's a separate meter.</p>
            <p>A transfer fee is capitalised and written off across the contract. Sign someone for €30M on a five-year deal and the books carry €6M a year, every year, whether he plays or not. Add his gross wage and you have what he costs the club that season.</p>
            <p>This is the method <b>Calcio e Finanza</b> use for their Serie A squad-cost tables: <i>"stipendi lordi + quota ammortamento per ogni singolo calciatore"</i> — gross wages plus each player's amortisation share. The totals here track theirs closely.</p>
          </Row>

          <Row id="wages" q="Where do the wages come from?">
            <p><b>Capology</b> and <b>Calcio e Finanza</b>, and they're <b>gross</b> — which is what the cap counts and what those tables publish.</p>
            <p>Net is shown too, but the ratio isn't uniform. Players who still qualify for Italy's <b>Decreto Crescita</b> tax break convert at roughly ×1.5; everyone else at ×1.84. That's why Lautaro and Barella aren't on the same multiplier as Çalhanoğlu.</p>
            <p>When you sign someone, you enter <b>net</b> — the number clubs actually negotiate — and it's grossed up at ×1.84 for the cap.</p>
          </Row>

          <Row id="bonus" q="What about add-ons and bonuses?">
            <p><b>We use the base fee.</b> €25M plus bonuses is entered as €25M.</p>
            <p>This one's genuinely contested, so here's the full picture. Under IFRS there are <b>three acceptable treatments</b> of contingent fees, and the IFRS Interpretations Committee explicitly failed to reach consensus. Manchester United capitalise the present value of add-ons they judge <i>probable</i> (over 50% likely) into the cost of the registration — so for them, bonuses do lift amortisation. Other clubs only add them once they're actually triggered.</p>
            <p>We follow the base fee because that's what Inter's published amortisation runs on, and therefore what the €192.3M cap we're measuring against is built from. Mixing a bonus-inclusive fee into a bonus-exclusive cap would quietly break the comparison.</p>
            <p>A separate thing that gets called a bonus: a <b>sign-on fee paid to the player</b>. That's an employee cost — it belongs in wages, never in amortisation.</p>
            <p><b>Agent commissions are excluded</b>, which is also what Calcio e Finanza do.</p>
          </Row>

          <Row id="buyback" q="Why is Stanković only €2.6M a year?">
            <p>Because a buy-back doesn't book at the headline fee.</p>
            <p>Inter sold him to Brugge for €10M, then bought him back for €23M. The €10M was already recognised as a gain when he left. What lands on the books now is the <b>net of the two deals — €13M</b> — spread over his five-year contract. €2.6M a year, not €4.6M.</p>
            <p>In the cash meter he still shows as the full €23M out, because that's what actually left the bank. The two meters disagree, and they're both right — that gap is the whole point of the exercise.</p>
          </Row>

          <Row id="youth" q="Why doesn't selling an academy player cut the wage bill?">
            <p>Because he was never on it. U23 and Primavera wages sit outside the registered senior squad, so they don't touch the cost cap.</p>
            <p>But he cost nothing to sign, so his book value is roughly zero — which means <b>selling him is almost pure profit</b>. He's a lever on the cash balance, not on the wage bill. It's exactly why Italian clubs sell academy players in late June, and why the academy is worth ~€40M here.</p>
          </Row>

          <Row id="caps" q="Where do the two limits come from?">
            <p><b>€192.3M squad cost</b> — what the 25/26 squad cost. The assumption is that Inter spend no more next season than they did last, which is roughly how the club has been operating under Oaktree.</p>
            <p><b>−€50M net spend</b> — the reported ceiling on how far Inter will go beyond what they bring in. Sales fund signings.</p>
            <p>These are assumptions, not laws. They're the frame for the exercise, not a UEFA regulation.</p>
          </Row>

          <Row id="stale" q="Where does the squad data come from?">
            <p><b>Transfers and contracts:</b> Inter's official announcements first, then Fabrizio Romano / Sky Sport Italia and Di Marzio for anything the club hasn't posted yet.</p>
            <p><b>Fees:</b> Transfermarkt, which is reliable on the numbers — though its ledger needs reading with some judgement. A player who comes back off loan and is sold a week later shows up as two separate movements, when the only thing that matters here is that he left.</p>
            <p><b>Wages and amortisation:</b> Capology and Calcio e Finanza.</p>
            <p>Departures and renewals are entered by hand rather than scraped. A feed that confidently invents a transfer does more damage than one that's a day behind.</p>
          </Row>
        </div>
      </div>
    </div>
  );
}

/* ===================== SHARE ===================== */
function ShareModal({ state, cost, cash, moves, onClose }) {
  const [name, setName] = useState(state.n || "");
  const [copied, setCopied] = useState(false);

  const link = useMemo(() => {
    const st = { ...state, n: name.trim() };
    const base = window.location.origin + window.location.pathname;
    return base + "#s=" + encodeState(st);
  }, [state, name]);

  const title = name.trim() ? `${name.trim()}'s Inter` : "An Inter squad";

  const copy = () => {
    navigator.clipboard?.writeText(link);
    setCopied(true);
    setTimeout(() => setCopied(false), 2200);
  };
  const share = () => {
    if (navigator.share) {
      navigator.share({ title, text: `${title} — ${fmtM(cost)} squad cost, ${moves} moves. Take a look.`, url: link });
    } else copy();
  };

  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet" onClick={e => e.stopPropagation()}>
        <button className="close" onClick={onClose}>✕</button>
        <h3>Share your squad</h3>
        <div className="sub">The link carries your squad inside it — no account, nothing stored anywhere. Whoever opens it sees exactly what you built.</div>

        <div className="f" style={{ marginTop: 16 }}>
          <label>Name it (optional)</label>
          <input value={name} onChange={e => setName(e.target.value)} placeholder="Leave blank if you'd rather not" maxLength={28} />
        </div>

        <div className="share-card">
          <div className="sc-title">{title}</div>
          <div className="sc-stats">
            <span><b style={{ color: cost > CAP ? "var(--red)" : "var(--ink)" }}>{fmtM(cost)}</b>squad cost</span>
            <span><b>{(cash >= 0 ? "+" : "") + fmtM(cash)}</b>net spend</span>
            <span><b>{moves}</b>{moves === 1 ? "move" : "moves"}</span>
          </div>
        </div>

        <div className="pop-actions">
          <button className="cta" onClick={share}>{navigator.share ? "Share" : (copied ? "✓ Copied" : "Copy link")}</button>
          {navigator.share && <button className="cta ghost2" onClick={copy}>{copied ? "✓ Copied" : "Copy link"}</button>}
        </div>
        <div className="pop-hint">Long links are normal — the whole squad is folded into it.</div>
      </div>
    </div>
  );
}

/* ===================== SHORTLIST ROW ===================== */
function ShortlistRow({ t, onUpdate, onSign, onRemove }) {
  const [open, setOpen] = useState(false);
  const [fee, setFee] = useState(t.free ? 0 : (t.fee || 0) / 1e6);
  const [years, setYears] = useState(t.years || 4);
  const [net, setNet] = useState(t.net != null ? t.net / 1e6 : (t.salary / 1.84 / 1e6));

  const gross = (net || 0) * 1e6 * 1.84;
  const effFee = t.free ? 0 : (fee || 0) * 1e6;
  const annualCost = effFee / (years || 1) + gross;

  const save = () => {
    onUpdate(t.id, { fee: effFee, years, net: (net || 0) * 1e6, salary: gross });
    setOpen(false);
  };

  return (
    <div style={{ background: "var(--card)", borderRadius: 12, boxShadow: "var(--shadow)", marginBottom: 7, overflow: "hidden" }}>
      <div className="crow" style={{ boxShadow: "none", marginBottom: 0 }}>
        <span className="nm">{t.name}</span>
        <span className="tag" style={{ background: "#EAF1FD", color: "var(--blue2)" }}>
          {POS[t.pos]} · {t.free ? "free" : fmtM(effFee)}
        </span>
        <span className="r">
          <span style={{ fontSize: 13, fontWeight: 600 }}>{fmtM(annualCost)}/yr</span>
          <button className="undo" onClick={() => setOpen(o => !o)}>{open ? "Close" : "Edit"}</button>
          <button className="undo" style={{ background: "var(--blue)", color: "#fff" }}
            onClick={() => onSign({ ...t, fee: effFee, years, salary: gross, net: (net || 0) * 1e6 })}>Sign</button>
          <button className="undo" onClick={() => onRemove(t.id)}>Remove</button>
        </span>
      </div>
      {open && (
        <div style={{ padding: "0 14px 14px" }}>
          <div className="fieldrow">
            <div className="f">
              <label>Fee (€M){t.free ? " · free" : ""}</label>
              <input type="number" min="0" step="0.5" value={t.free ? 0 : fee} disabled={t.free}
                onChange={e => setFee(e.target.value)} style={t.free ? { opacity: .55 } : undefined} />
            </div>
            <div className="f">
              <label>Contract (yrs)</label>
              <input type="number" min="1" max="6" value={years} onChange={e => setYears(+e.target.value)} />
            </div>
            <div className="f">
              <label>Net wage (€M/yr)</label>
              <input type="number" min="0" step="0.1" value={net} onChange={e => setNet(e.target.value)} />
            </div>
          </div>
          <div className="hint2">
            Gross wage {fmtM(gross)} · amortisation {fmtM(effFee / (years || 1))} · <b>annual cost {fmtM(annualCost)}</b>
          </div>
          <button className="cta" onClick={save}>Save changes</button>
        </div>
      )}
    </div>
  );
}

/* ===================== APP ===================== */
function App() {
  const [players, setPlayers] = useState(() => [...SQUAD, ...YOUTH].map(p => ({ ...p, zone: "field" })));
  const [ledger, setLedger] = useState(DONE);
  const [source, setSource] = useState({ from: "built-in", asOf: null });
  const [squadName, setSquadName] = useState("");
  const [viewOnly, setViewOnly] = useState(false);   // arrived via a shared link
  const [restored, setRestored] = useState(false);   // picked up an unfinished session
  const [started, setStarted] = useState(() => /[#&]s=/.test(window.location.hash || ""));
  const [signed, setSigned] = useState({});
  const [shortlist, setShortlist] = useState([]); // array of target objects {id,name,pos,fee,years,salary,net,free,value,src,wageLogic}
  const [extensions, setExtensions] = useState({});
  const [modal, setModal] = useState(null); // 'sign'|'extend'
  const [popover, setPopover] = useState(null); // {player, x, y}

  const applied = players.map(p => extensions[p.id] ? { ...p, amort: extensions[p.id].amort, salary: extensions[p.id].salary } : p);

  // squad.json wins if it's there; otherwise the built-in squad stands.
  const loaded = useRef(false);
  useEffect(() => {
    if (loaded.current) return;
    loaded.current = true;
    fetch(SQUAD_URL + "?t=" + Date.now())
      .then(r => (r.ok ? r.json() : Promise.reject()))
      .then(d => {
        if (!Array.isArray(d.squad) || !d.squad.length) return;
        const live = d.squad.filter(p => !p.gone);
        STORE.until = Object.fromEntries(live.filter(p => p.until).map(p => [p.id, p.until]));
        STORE.talk = d.talk || {};
        const base = live.map(p => ({ ...p, role: p.spot ? "start" : "bench", zone: "field" }));
        setPlayers(base);
        if (Array.isArray(d.cash)) {
          setLedger(d.cash.map(c => ({ name: c.name, detail: c.detail, cash: c.amount })));
        }
        setSource({ from: "squad.json", asOf: d.asOf || null });
        hydrate(base);
      })
      .catch(() => {
        // no squad.json — the built-in squad stands
        hydrate([...SQUAD, ...YOUTH].map(p => ({ ...p, zone: "field" })));
      });
  }, []);

  /* a shared link wins; otherwise pick up where they left off */
  const hydrate = base => {
    const hash = window.location.hash || "";
    const m = hash.match(/[#&]s=([^&]+)/);
    if (m) {
      const st = decodeState(m[1]);
      if (st) { applyPacked(st, base); setViewOnly(true); return; }
    }
    const saved = localStorage.getItem(SAVE_KEY);
    if (saved) {
      const st = decodeState(saved);
      if (st && ((st.x || []).length || (st.s || []).length || (st.e || []).length)) {
        applyPacked(st, base);
        setRestored(true);
      }
    }
  };

  /* apply a packed state (from a link, or from the last session) onto the squad */
  const applyPacked = (st, base) => {
    if (st.n) setSquadName(st.n);
    let next = [...base];
    const extraLedger = [];

    (st.s || []).forEach(a => {
      if (next.some(p => p.id === a.i)) return;
      next.push({
        id: a.i, name: a.n, pos: a.p, age: a.a,
        amort: (a.f || 0) / (a.y || 1), salary: a.w, mult: 1.84,
        role: "bench", zone: "field", newSigning: true,
        until: new Date().getFullYear() + (a.y || 4),
      });
      setSigned(o => ({ ...o, [a.i]: { fee: a.f, years: a.y, salary: a.w, name: a.n, pos: a.p } }));
    });

    (st.x || []).forEach(d => {
      next = next.map(p => p.id === d.i
        ? { ...p, zone: "exit", exit: { mode: d.m, fee: d.f, coverage: d.c } }
        : p);
    });

    if (st.e?.length) {
      setExtensions(Object.fromEntries(st.e.map(e => [e.i, { amort: e.a, salary: e.w, addYears: e.y, raise: 0 }])));
    }

    setPlayers(next);
  };

  /* keep the fan's work between visits — closing the tab shouldn't cost them the squad */
  useEffect(() => {
    if (viewOnly || !loaded.current) return;
    const st = packState({ players, signed, extensions, ledger, name: squadName });
    const touched = st.x.length || st.s.length || st.e.length;
    if (touched) localStorage.setItem(SAVE_KEY, encodeState(st));
    else localStorage.removeItem(SAVE_KEY);
  }, [players, signed, extensions, squadName, viewOnly]);

  const handleTap = (id, pt) => {
    const p = applied.find(x => x.id === id);
    if (p) setPopover({ player: p, x: pt.x, y: pt.y });
  };
  const { dragId, start } = useDrag(null, handleTap);

  // sell / loan directly from the popover
  const sellPlayer = (id, exit) => { setPlayers(prev => prev.map(p => p.id === id ? { ...p, zone: "exit", exit } : p)); setPopover(null); };
  const undo = id => setPlayers(prev => prev.map(p => p.id === id ? { ...p, zone: "field", exit: undefined } : p));

  // shortlist → confirm signing → adds to `signed` and onto the pitch as a player
  const addToShortlist = t => { setShortlist(prev => prev.some(x => x.id === t.id) ? prev : [...prev, t]); };
  const updateShortlist = (id, patch) => setShortlist(prev => prev.map(x => x.id === id ? { ...x, ...patch } : x));
  const removeFromShortlist = id => setShortlist(prev => prev.filter(x => x.id !== id));
  const confirmSigning = t => {
    setSigned(o => ({ ...o, [t.id]: { fee: t.fee, years: t.years, salary: t.salary, name: t.name, pos: t.pos } }));
    // place the new signing onto the pitch as a bench player
    setPlayers(prev => [...prev, {
      id: t.id, name: t.name, pos: t.pos, age: t.age || 25,
      amort: t.free ? 0 : (t.fee || 0) / (t.years || 1), salary: t.salary,
      mult: 1.84, role: "bench", zone: "field", newSigning: true, value: t.value,
      until: 2026 + (t.years || 4),
    }]);
    setShortlist(prev => prev.filter(x => x.id !== t.id));
  };
  // return a simulator-signed player back to the shortlist
  const returnToShortlist = id => {
    const s = signed[id];
    setSigned(o => { const n = { ...o }; delete n[id]; return n; });
    setPlayers(prev => prev.filter(p => p.id !== id));
    if (s) addToShortlist({ id, name: s.name, pos: s.pos, fee: s.fee, years: s.years, salary: s.salary, free: s.fee === 0 });
    setPopover(null);
  };



  const calc = useMemo(() => {
    let cost = 0, cash = ledger.reduce((t, d) => t + d.cash, 0), ageSum = 0, n = 0;
    applied.forEach(p => {
      // youth wages sit outside the registered senior squad → no squad-cost hit
      if (!p.tier) {
        cost += annual(p);
        if (p.zone !== "exit") { ageSum += p.age; n++; }
      }
      // but a youth sale is still cash in (and near-pure capital gain)
      if (p.zone === "exit" && p.exit?.mode === "sell") cash += p.exit.fee || 0;
    });
    Object.values(signed).forEach(s => { cash -= s.fee || 0; });
    return { cost, cash, avgAge: n ? ageSum / n : 0, size: n };
  }, [applied, signed, ledger]);

  const overCost = calc.cost > CAP, overCash = calc.cash < CASH_FLOOR;
  const moveCount = applied.filter(p => p.zone === "exit").length + Object.keys(signed).length + Object.keys(extensions).length;

  // cash ledger: locked deals + user's sales + user's signings
  const cashLines = [
    ...ledger.filter(d => d.cash !== 0).map(d => ({ name: d.name, detail: d.detail + " · done", amount: d.cash })),
    ...applied.filter(p => p.zone === "exit" && p.exit?.mode === "sell")
      .map(p => ({ name: p.name, detail: "sold by you", amount: p.exit.fee || 0 })),
    ...Object.values(signed).filter(s => (s.fee || 0) > 0)
      .map(s => ({ name: s.name, detail: "signed by you", amount: -(s.fee || 0) })),
  ].sort((a, b) => b.amount - a.amount);
  const nodes = layout(applied);
  const exitList = applied.filter(p => p.zone === "exit");
  const signedList = Object.entries(signed).map(([id, s]) => ({ ...s, id }));
  const extList = Object.keys(extensions).map(id => SQUAD.find(p => p.id === id)).filter(Boolean);

  if (!started) {
    return (
      <>
        <style>{CSS}</style>
        <Splash onPlay={() => setStarted(true)} />
      </>
    );
  }

  return (
    <div className="app">
      <style>{CSS}</style>
      <div className="wrap top">
        <div className="badge">IM</div>
        <h1>Build the Nerazzurri</h1>
        {viewOnly
          ? <p>{squadName ? <><b>{squadName}'s</b> version of Inter.</> : "Someone's version of Inter."} You're looking at a squad a fan built — the moves they made are already in the numbers below.</p>
          : <p>The 26/27 squad in a 3-5-2. Colour is annual cost — green cheap, red dear. Tap a player to sell, loan or extend.</p>}
      </div>

      {viewOnly && (
        <div className="wrap">
          <div className="viewbar">
            <span>You're viewing a shared squad.</span>
            <button onClick={() => {
              localStorage.removeItem(SAVE_KEY);
              window.location.hash = "";
              window.location.reload();
            }}>Build your own →</button>
          </div>
        </div>
      )}
      {restored && !viewOnly && (
        <div className="wrap">
          <div className="viewbar soft">
            <span>Picked up where you left off.</span>
            <button onClick={() => {
              localStorage.removeItem(SAVE_KEY);
              window.location.reload();
            }}>Start again</button>
          </div>
        </div>
      )}

      {!viewOnly && (
        <div className="wrap">
          <div className="rules">
            <div className="ru">
              <span className="ru-n">1</span>
              <span>
                <b>Spend no more than last season.</b>
                Inter's 25/26 squad cost {fmtM(CAP)}. That's the ceiling — a player's annual cost is
                what's left to amortise on his fee, plus his gross wage.
              </span>
            </div>
            <div className="ru">
              <span className="ru-n">2</span>
              <span>
                <b>Don't go past {fmtM(CASH_FLOOR)} net.</b>
                The reported limit on what the club will spend beyond what it brings in. Sales fund
                signings — and the academy is nearly pure profit, because those players cost nothing to sign.
              </span>
            </div>
          </div>
          <button className="methodlink" onClick={() => setModal({ type: "method" })}>
            How these numbers are worked out, and where they come from →
          </button>
        </div>
      )}

      <div className="board"><div className="wrap">
        <div className="meters">
          <button className="meter tappable" onClick={() => setModal({ type: "costdetail" })}>
            <div className="top-row"><span className="lbl">Squad cost · cap {fmtM(CAP)}</span><span className={"val" + (overCost ? " bad" : "")}>{fmtM(calc.cost)}</span></div>
            <div className="track"><div className="tfill" style={{ width: Math.min(100, calc.cost / (CAP * 1.12) * 100) + "%", background: overCost ? "var(--red)" : "var(--blue2)" }} /><div className="cap" style={{ insetInlineStart: (CAP / (CAP * 1.12) * 100) + "%" }} /></div>
            <div className={"cnote" + (overCost ? " bad" : "")}>{overCost ? "Over by " + fmtM(calc.cost - CAP) : fmtM(CAP - calc.cost) + " of headroom"}<span className="seemore">View breakdown ›</span></div>
          </button>
          <button className="meter tappable" onClick={() => setModal({ type: "cashdetail" })}>
            <div className="top-row"><span className="lbl">Net transfer spend · floor {fmtM(CASH_FLOOR)}</span><span className={"val" + (overCash ? " bad" : "")}>{(calc.cash >= 0 ? "+" : "") + fmtM(calc.cash)}</span></div>
            <div className="track"><div className="tfill" style={{ width: Math.min(100, (40e6 - calc.cash) / 120e6 * 100) + "%", background: overCash ? "var(--red)" : "var(--grass)" }} /><div className="cap" style={{ insetInlineStart: ((40e6 - CASH_FLOOR) / 120e6 * 100) + "%" }} /></div>
            <div className={"cnote" + (overCash ? " bad" : "")}>{overCash ? "Below floor by " + fmtM(CASH_FLOOR - calc.cash) : fmtM(calc.cash - CASH_FLOOR) + " left to spend"}<span className="seemore">View breakdown ›</span></div>
          </button>
        </div>
      </div></div>

      <div className="wrap">
        {!viewOnly && <div className="actions">
          <button className="act" onClick={() => setModal({ type: "sell" })}>
            <div className="ico" style={{ background: "#FDEBEC", color: "var(--red)" }}>↗</div>
            <div className="t">Sell or loan</div><div className="d">Costliest first</div>
          </button>
          <button className="act" onClick={() => setModal({ type: "sign" })}>
            <div className="ico" style={{ background: "#EAF7EF", color: "var(--green)" }}>+</div>
            <div className="t">Sign a player</div><div className="d">Name them and set the terms</div>
          </button>
          <button className="act" onClick={() => setModal({ type: "extend" })}>
            <div className="ico" style={{ background: "#F3EEFB", color: "#6E43C4" }}>↻</div>
            <div className="t">Extend a deal</div><div className="d">Expiring contracts first</div>
          </button>
        </div>}

        <div className="pitch-card">
          <div className="pitch" data-drop="field">
            <svg viewBox="0 0 100 124" preserveAspectRatio="none">
              <g fill="none" stroke="rgba(255,255,255,.28)" strokeWidth=".4">
                <rect x="3" y="3" width="94" height="118" rx="1" />
                <line x1="3" y1="62" x2="97" y2="62" />
                <circle cx="50" cy="62" r="9.5" />
                <rect x="30" y="3" width="40" height="15" /><rect x="30" y="106" width="40" height="15" />
                <rect x="41" y="3" width="18" height="6" /><rect x="41" y="115" width="18" height="6" />
              </g>
            </svg>
            <div className="grid">
              {nodes.map(cell => (
                <div className="cell" key={cell.key} style={{ gridColumn: cell.col, gridRow: cell.row }}>
                  {cell.starter && <Chip p={cell.starter} size="start" dragging={dragId === cell.starter.id} onDown={start} />}
                  {cell.subs.map(s => <Chip key={s.id} p={s} size="sub" dragging={dragId === s.id} onDown={start} />)}
                </div>
              ))}
            </div>
          </div>
        </div>
        <div style={{ textAlign: "center", fontSize: 11.5, color: "var(--ink2)", marginTop: 10 }}>
          {viewOnly ? "Tap any player to see their contract and cost. ★ = signed." : "Tap any player for their status, contract, transfer talk — and to sell, loan or extend. ★ = signed this window."}
        </div>

        {!viewOnly && moveCount > 0 && (
          <button className="sharebtn" onClick={() => setModal({ type: "share" })}>
            <span className="sb-main">Share this squad</span>
            <span className="sb-sub">{moveCount} {moveCount === 1 ? "move" : "moves"} · {fmtM(calc.cost)} squad cost</span>
          </button>
        )}

        {shortlist.length > 0 && !viewOnly && (
          <div className="changes">
            <h3>SHORTLIST — EDIT &amp; CONFIRM</h3>
            {shortlist.map(t => (
              <ShortlistRow key={t.id} t={t}
                onUpdate={updateShortlist}
                onSign={confirmSigning}
                onRemove={removeFromShortlist} />
            ))}
          </div>
        )}

        {(exitList.length > 0 || signedList.length > 0 || extList.length > 0) && (
          <div className="changes">
            <h3>YOUR MOVES</h3>
            {exitList.map(p => (
              <div className="crow" key={p.id}>
                <span className="nm">{p.name}</span>
                <span className={"tag " + (p.exit.mode === "sell" ? "sell" : "loan")}>{p.exit.mode === "sell" ? "Sold " + fmtM(p.exit.fee) : "Loaned " + p.exit.coverage + "%"}</span>
                <span className="r"><span style={{ fontSize: 13, fontWeight: 600 }}>{fmtM(annual(p))}/yr</span><button className="undo" onClick={() => undo(p.id)}>Undo</button></span>
              </div>
            ))}
            {signedList.map(s => (
              <div className="crow" key={s.id}>
                <span className="nm">{s.name}</span><span className="tag sign">Signed {s.fee ? fmtM(s.fee) : "free"}</span>
                <span className="r"><span style={{ fontSize: 13, fontWeight: 600 }}>{fmtM((s.fee || 0) / s.years + s.salary)}/yr</span><button className="undo" onClick={() => returnToShortlist(s.id)}>↩ Shortlist</button></span>
              </div>
            ))}
            {extList.map(p => (
              <div className="crow" key={p.id}>
                <span className="nm">{p.name}</span><span className="tag ext">Extended +{extensions[p.id].addYears}y</span>
                <span className="r"><span style={{ fontSize: 13, fontWeight: 600 }}>{fmtM(extensions[p.id].amort + extensions[p.id].salary)}/yr</span><button className="undo" onClick={() => setExtensions(o => { const n = { ...o }; delete n[p.id]; return n; })}>Undo</button></span>
              </div>
            ))}
          </div>
        )}

        <div className="done-row">
          <span style={{ fontSize: 12, fontWeight: 600, color: "var(--ink2)" }}>Done deals 🔒</span>
          {source.from === "squad.json" && (
            <span className="src-tag" title="Loaded from squad.json">
              squad.json{source.asOf ? " · " + source.asOf : ""}
            </span>
          )}
          {ledger.map((d, i) => <span className="done-chip" key={i}><b>{d.name}</b> {d.detail}</span>)}
        </div>

        <div className="ftr">
          Annual squad cost = amortization (fee ÷ contract years) + gross wage. Cap = 25/26 squad cost.<br />
          Signings are entered by hand: you name the player, the fee, the term and the wage. The simulator's job isn't to tell you who's available — it's to tell you what a move would actually cost you, and whether the books still balance afterwards. Squad figures are verified gross wages and book amortisation as of the build date.
        </div>
      </div>

      {modal?.type === "sell" && <SellModal players={applied} onClose={() => setModal(null)} onApply={(id, exit) => { sellPlayer(id, exit); setModal(null); }} />}
      {modal?.type === "sign" && <SignModal onClose={() => setModal(null)} onShortlist={t => { addToShortlist(t); setModal(null); }} />}
      {modal?.type === "extend" && <ExtendModal players={applied} extensions={extensions} onClose={() => setModal(null)} onApply={(id, e) => { setExtensions(o => ({ ...o, [id]: e })); setModal(null); }} />}
      {modal?.type === "costdetail" && <CostBreakdown players={applied} onClose={() => setModal(null)} />}
      {modal?.type === "cashdetail" && <CashBreakdown lines={cashLines} total={calc.cash} onClose={() => setModal(null)} />}
      {modal?.type === "method" && <MethodModal onClose={() => setModal(null)} />}
      {modal?.type === "share" && (
        <ShareModal
          state={packState({ players, signed, extensions, ledger, name: squadName })}
          cost={calc.cost} cash={calc.cash} moves={moveCount}
          onClose={() => setModal(null)} />
      )}
      {popover && <Popover data={popover} viewOnly={viewOnly}
        onSell={sellPlayer}
        onReturn={returnToShortlist}
        onExtend={(id, e) => { setExtensions(o => ({ ...o, [id]: e })); setPopover(null); }}
        onClose={(id, action) => { if (action === "undo") undo(id); setPopover(null); }} />}
    </div>
  );
}


document.getElementById("boot").remove();
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

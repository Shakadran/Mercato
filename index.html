@import url('https://rsms.me/inter/inter.css');
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
/* dark is the default; .light on <body> flips every surface at once */
:root{
  --pixel:'Press Start 2P', 'Courier New', monospace;
  --bg:#08090C; --card:#111318; --ink:#F2F4F8; --ink2:#8A8F9C; --hair:#20242C;
  --blue:#1B54D6; --blue2:#4A87FF; --accent:#4A87FF; --grass:#2E7D46;
  --red:#FF5B60; --amber:#E8A93C; --green:#3FCE7C;
  --sunk:#181B21; --sunk2:#0D0F13; --raise:#1C2028;
  --tint-b:#152134; --tint-g:#10281B; --tint-r:#2A1417;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.35);
  --scrim:rgba(0,0,0,.66);
}
.light{
  --bg:#F5F5F7; --card:#FFFFFF; --ink:#1D1D1F; --ink2:#6E6E73; --hair:#E3E3E6;
  --blue:#0A2A6B; --blue2:#1B54D6; --accent:#0071E3; --grass:#2E7D46;
  --red:#E5484D; --amber:#B37A12; --green:#2F9E5B;
  --sunk:#F5F5F7; --sunk2:#FAFAFB; --raise:#F0F0F2;
  --tint-b:#EAF1FD; --tint-g:#EAF7EF; --tint-r:#FDEBEC;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.06);
  --scrim:rgba(0,0,0,.32);
}
*{box-sizing:border-box}
.app{font-family:'Inter',-apple-system,sans-serif;font-feature-settings:'cv11','ss01';background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:96px}
.app h1,.app h2,.app h3{margin:0;font-weight:600;letter-spacing:-.02em;color:var(--ink)}
.wrap{max-width:760px;margin:0 auto;padding:0 20px}

.themebtn{position:fixed;top:14px;right:14px;z-index:80;width:34px;height:34px;border-radius:50%;
  border:1px solid var(--hair);background:var(--card);color:var(--ink);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);transition:transform .12s}
.themebtn:hover{transform:scale(1.08)}
.top{text-align:center;padding:42px 0 12px}
.top h1{font-size:clamp(28px,5vw,40px);font-weight:700;letter-spacing:-.035em;color:var(--ink)}
.top p{color:var(--ink2);font-size:14px;line-height:1.5;max-width:44ch;margin:8px auto 0}

/* meters */
.board{background:var(--bg);padding:12px 0;margin-top:14px;border-bottom:1px solid var(--hair)}
.meters{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:520px){.meters{grid-template-columns:1fr}}
.meter{background:var(--card);border-radius:16px;padding:13px 16px;box-shadow:var(--shadow)}
.meter .top-row{display:flex;justify-content:space-between;align-items:baseline}
.meter .lbl{font-size:12px;color:var(--ink2);font-weight:500}
.meter .val{font-size:26px;font-weight:700;letter-spacing:-.03em;font-variant-numeric:tabular-nums;color:var(--ink)}
.meter .val.bad{color:var(--red)}
.track{height:6px;border-radius:3px;background:var(--raise);overflow:hidden;margin-top:10px;position:relative}
.tfill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.22,.7,.28,1),background .3s}
.cap{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--ink);opacity:.55;border-radius:2px}
.meter .cnote{font-size:11.5px;color:var(--ink2);margin-top:8px}
.meter .cnote.bad{color:var(--red)}

/* segmented toggle */
.seg{display:inline-flex;background:var(--sunk);border-radius:9px;padding:2px;gap:2px}
.seg button{font-family:inherit;font-size:12px;font-weight:500;border:none;background:none;color:var(--ink2);padding:4px 12px;border-radius:7px;cursor:pointer;transition:all .15s}
.seg button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}

/* pitch */
.pitch-card{margin:14px auto 0;max-width:696px;background:linear-gradient(160deg,#2f8049,#276b3d);border-radius:22px;padding:8px;box-shadow:var(--shadow)}
.pitch{position:relative;width:100%;aspect-ratio:10/13.2;max-width:680px;margin:0 auto;overflow:visible;
  background:repeating-linear-gradient(0deg,rgba(255,255,255,.028) 0 8.33%,rgba(0,0,0,.028) 8.33% 16.66%)}
.pitch svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.grid{position:absolute;inset:0;display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:auto auto auto auto;align-content:space-evenly;padding:26px 3% 20px;gap:14px 2%}
.cell{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:4px;min-width:0;overflow:visible;position:relative;z-index:2}
.node{display:contents}
/* Every player gets the same tile. Legibility isn't what you trade away for
   hierarchy \u2014 that comes from how loud the tile is, not how small the name is. */
.chip{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  cursor:pointer;touch-action:manipulation;user-select:none;
  width:100%;max-width:84px;min-height:34px;padding:4px 5px;
  border-radius:0;white-space:nowrap;text-align:center;backdrop-filter:blur(3px);
  transition:transform .1s,background .15s,border-color .15s}
.chip:hover{background:rgba(6,20,10,.66)}
.chip:active{cursor:grabbing}
.chip.sub:hover{background:rgba(6,20,10,.56)}
.chip.drag{opacity:.4}
.chip .nm{font-weight:600;line-height:1.2;letter-spacing:-.02em;color:#fff;white-space:nowrap;
  max-width:100%;overflow:hidden;text-overflow:ellipsis}
.chip.start .nm{font-size:9.5px;color:#fff}
.chip.sub .nm{font-size:9.5px;color:rgba(255,255,255,.9)}
.chip .amt{font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.chip.start .amt{font-size:7px}
.chip.sub .amt{font-size:7px}
.chip .lock{font-size:8px;opacity:.85}
.chip .flag{font-weight:700;margin-inline-end:2px;font-size:.92em}
.chip .flag.star{color:var(--gold)}
.chip .flag.out{color:#FF8A5B}
.chip .flag.rum{color:#7FB2FF;font-size:1.1em;line-height:0}
.subwrap{display:none}
.bench-strip{display:none}

/* player info popover \u2192 action sheet */
.pop-sheet{max-width:420px}
.pop-head2{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-top:2px}
.pop-name2{font-size:19px;font-weight:700;letter-spacing:-.02em}
.pop-pos2{font-size:12px;color:var(--ink2);font-weight:500}
.pop-status{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.pop-badge{font-size:11px;font-weight:600;padding:2px 9px;border:1px solid;border-radius:20px}
.pop-rows{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.pop-rows>div{display:flex;justify-content:space-between;align-items:baseline;font-size:13px}
.pop-rows span{color:var(--ink2)}
.pop-rows b{color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums}
.pop-note{margin-top:12px;font-size:12px;line-height:1.45;color:var(--ink2);background:var(--sunk);border-radius:10px;padding:9px 11px}

/* tappable meters + breakdown tables */
.meter.tappable{width:100%;text-align:inherit;border:none;font-family:inherit;cursor:pointer;transition:transform .12s,box-shadow .12s}
.meter.tappable:hover{transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,.08),0 10px 28px rgba(0,0,0,.08)}
.meter.tappable:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.cnote{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.seemore{color:var(--accent);font-weight:600;font-size:11px;white-space:nowrap}
.sheet.wide{max-width:660px}
.tbl-wrap{margin-top:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.tbl th{text-align:start;font-size:10.5px;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:.04em;
  padding:7px 8px;border-bottom:1px solid var(--hair);cursor:pointer;white-space:nowrap;user-select:none}
.tbl th:hover{color:var(--accent)}
.tbl th.on{color:var(--accent)}
.tbl td{padding:8px;border-bottom:1px solid var(--hair);white-space:nowrap}
.tbl tr.dim{opacity:.45}
.tbl .pname{font-weight:600;color:var(--ink)}
.tbl .mut{color:var(--ink2)}
.tbl .num{text-align:end;font-variant-numeric:tabular-nums}
.tbl .strong{font-weight:700}
.tbl tfoot td{border-bottom:none;border-top:2px solid var(--hair);font-weight:700;color:var(--ink);padding-top:10px}
.outtag{font-size:9px;font-weight:600;color:var(--red);background:var(--tint-r);border-radius:20px;padding:1px 6px;margin-inline-start:5px}
.tier{font-size:9px;font-weight:700;border-radius:20px;padding:1px 6px;margin-inline-start:6px;letter-spacing:.02em}
.tier.u23{background:var(--tint-b);color:var(--blue2)}
.tier.primavera{background:var(--tint-b);color:var(--blue2)}

/* live sync bar */
.syncbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:20px;
  background:var(--card);border:1px solid var(--hair);border-radius:12px;padding:11px 14px;box-shadow:var(--shadow)}
.syncbar.baseline{border-color:#4A3A1C;background:var(--sunk)}
.sync-left{display:flex;align-items:center;gap:10px;min-width:0}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--ink2)}
.sync-dot.loading{background:var(--accent);animation:pulse 1.2s ease-in-out infinite}
.sync-dot.done{background:var(--green);box-shadow:0 0 0 3px rgba(47,158,91,.15)}
.sync-dot.baseline{background:var(--amber)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.syncbar b{font-size:12.5px;font-weight:600;display:block}
.sync-sub{font-size:11px;color:var(--ink2);display:block;margin-top:1px}
.sync-log{margin-top:8px;display:flex;flex-direction:column;gap:4px}
.sync-line{font-size:11.5px;padding:6px 12px;border-radius:8px;background:var(--sunk);color:var(--ink2)}
.sync-line span{font-weight:700;margin-inline-end:6px}
.sync-line.in{background:var(--tint-g);color:var(--green)}
.sync-line.out{background:var(--tint-r);color:var(--red)}
@media(prefers-reduced-motion:reduce){.sync-dot.loading{animation:none}}
.dropdown{margin-top:12px;border:1px solid var(--hair);border-radius:12px;overflow:hidden;background:var(--sunk2)}
.dd-head{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:none;border:none;font-family:inherit;text-align:start;padding:12px 14px;cursor:pointer;transition:background .15s}
.dd-head:hover{background:var(--card)}
.dd-title{display:block;font-size:13.5px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
.dd-sub{display:block;font-size:11px;color:var(--ink2);margin-top:2px}
.dd-arrow{font-size:20px;color:var(--ink2);transform:rotate(90deg);transition:transform .2s;line-height:1}
.dd-arrow.open{transform:rotate(-90deg)}
.dd-body{padding:0 10px 10px;display:flex;flex-direction:column;gap:6px;background:var(--card);border-top:1px solid var(--hair)}
.dd-tab{font-size:10.5px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.05em;padding:12px 4px 4px}
.dd-tab.hot{color:var(--accent)}
.talk{margin-top:14px;background:var(--sunk);border:1px solid var(--hair);border-radius:12px;padding:11px 13px}
.talk-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
.talk-title{font-size:11px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.05em}
.talk-type{font-size:10.5px;font-weight:600;padding:2px 9px;border:1px solid;border-radius:20px}
.talk-price{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;margin-top:9px}
.talk-price span{color:var(--ink2)}
.talk-price b{font-weight:700;font-variant-numeric:tabular-nums}
.club-tag{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;background:var(--card);border:1px solid var(--hair);color:var(--ink)}
.talk-body{margin-top:9px;font-size:12px;line-height:1.5;color:var(--ink2)}
.pop-hint{margin-top:9px;font-size:11px;color:var(--ink2);opacity:.8;text-align:center}
/* pool search results */
.hits{margin-top:6px;border:1px solid var(--hair);border-radius:11px;overflow:hidden;background:var(--card)}
.hit{width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border:none;
  background:none;font-family:inherit;text-align:start;cursor:pointer;border-bottom:1px solid var(--hair)}
.hit:last-child{border-bottom:none}
.hit:hover{background:var(--tint-b)}
.hit b{display:block;font-size:13.5px;font-weight:600;color:var(--ink)}
.hit-m{display:block;font-size:11px;color:var(--ink2);margin-top:1px}
.hit-d{margin-inline-start:auto;font-size:10.5px;color:var(--ink2);white-space:nowrap}
.heat{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.heat.h3{background:var(--red);box-shadow:0 0 0 3px rgba(229,72,77,.15)}
.heat.h2{background:var(--amber)}
.heat.h1{background:#C8CCD6}
.picked{margin-top:12px;background:var(--sunk);border:1px solid var(--hair);border-radius:12px;padding:12px 14px}
.pk-row{display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px;padding:3px 0}
.pk-row span{color:var(--ink2)}
.pk-row b{color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums}
.pk-note{margin-top:8px;padding-top:8px;border-top:1px solid var(--hair);font-size:11.5px;
  color:var(--ink2);line-height:1.5}
.posmove{margin-top:14px;padding:12px 13px;background:var(--sunk);border:1px solid var(--hair);border-radius:12px}
.posmove label{display:block;font-size:11px;font-weight:600;color:var(--ink2);text-transform:uppercase;
  letter-spacing:.04em;margin-bottom:7px}
.posmove select{width:100%;font-family:inherit;font-size:14px;font-weight:600;color:var(--ink);
  border:1px solid var(--hair);border-radius:9px;padding:9px 11px;background:var(--card)}
.posmove select:focus{outline:none;border-color:var(--accent)}
.posmove-h{display:block;font-size:11px;color:var(--ink2);margin-top:6px;line-height:1.4}
.depth{margin-top:12px;padding-top:12px;border-top:1px solid var(--hair)}
.depth-l{display:block;font-size:11px;font-weight:600;color:var(--ink2);text-transform:uppercase;
  letter-spacing:.04em;margin-bottom:8px}
.depth-b{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.db{border:1px solid var(--hair);background:var(--card);color:var(--ink);border-radius:9px;
  padding:9px 14px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;
  transition:border-color .15s,background .15s}
.db:hover{border-color:var(--accent);background:var(--tint-b)}
.db.up{background:var(--blue);color:#fff;border-color:var(--blue)}
.db.up:hover{filter:brightness(1.15);background:var(--blue)}
.db-nudge{display:inline-flex;gap:4px;margin-inline-start:auto}
.db.sm{padding:9px 12px;font-size:13px;line-height:1}
.db.sm:disabled{opacity:.35;cursor:default;border-color:var(--hair);background:var(--card)}
.pop-actions{display:flex;gap:7px;margin-top:14px}
.pop-actions .cta{flex:1;padding:12px 8px;font-size:14px;white-space:nowrap}
.pop-actions .cta{margin-top:0}
.cta.ghost2{background:var(--raise);color:var(--ink)}

/* action bar */
.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px;margin-bottom:2px}
@media(max-width:520px){.actions{grid-template-columns:1fr}}
.act{background:var(--card);border:none;border-radius:16px;padding:16px 14px;text-align:right;cursor:pointer;box-shadow:var(--shadow);transition:transform .12s;font-family:inherit}
.act:hover{transform:translateY(-2px)}
.act:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.act .ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;margin-bottom:10px}
.act .t{font-size:14px;font-weight:600;letter-spacing:-.01em;color:var(--ink)}
.act .d{font-size:11.5px;color:var(--ink2);margin-top:3px;line-height:1.35}

/* sheet / modal */
.scrim{position:fixed;inset:0;background:var(--scrim);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:560px){.scrim{align-items:center}}
.sheet{background:var(--card);width:100%;max-width:520px;max-height:88vh;overflow-y:auto;border-radius:22px 22px 0 0;padding:20px;box-shadow:0 -10px 40px rgba(0,0,0,.2)}
@media(min-width:560px){.sheet{border-radius:22px}}
.sheet h3{font-size:19px;font-weight:700;letter-spacing:-.02em;color:var(--ink)}
.sheet .sub{font-size:12.5px;color:var(--ink2);margin-top:3px}
.close{float:left;border:none;background:var(--raise);width:28px;height:28px;border-radius:50%;font-size:15px;color:var(--ink);cursor:pointer;line-height:1}
.plist{margin-top:14px;display:flex;flex-direction:column;gap:7px}
.searchbar{display:flex;gap:8px;margin-bottom:4px}
.searchbar input{flex:1;font-family:inherit;font-size:14px;border:1px solid var(--hair);border-radius:10px;padding:10px 12px;background:var(--sunk2);color:var(--ink)}
.searchbar input:focus{outline:none;border-color:var(--accent);background:var(--card)}
.btn-search{font-family:inherit;font-size:13px;font-weight:600;border:none;border-radius:10px;background:var(--blue);color:#fff;padding:0 16px;cursor:pointer;min-width:74px;display:flex;align-items:center;justify-content:center}
.btn-search:disabled{opacity:.5;cursor:default}
.listlabel{font-size:11px;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:.04em;margin:6px 0 2px}
.prow{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--hair);border-radius:12px;cursor:pointer;transition:border-color .15s,background .15s;font-family:inherit;text-align:right;width:100%;background:none}
.prow:hover{border-color:var(--accent);background:var(--tint-b)}
.prow .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.prow .nm{font-size:14px;font-weight:600}
.prow .meta{font-size:11px;color:var(--ink2)}
.prow .r{margin-inline-start:auto;font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}
.pill{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;background:var(--raise);color:var(--ink2)}
.clubs{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.club{font-size:11.5px;font-weight:500;padding:5px 11px;border-radius:20px;border:1px solid var(--hair);background:var(--card);cursor:pointer;transition:all .15s;font-family:inherit;color:var(--ink)}
.club.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.fieldrow{display:flex;gap:12px;margin-top:14px;flex-wrap:wrap}
.f{display:flex;flex-direction:column;gap:5px;flex:1;min-width:120px}
.f label{font-size:11px;color:var(--ink2);font-weight:500}
.freerow{margin-top:12px}
.check{display:flex;align-items:center;gap:9px;cursor:pointer;font-size:13.5px;color:var(--ink);font-weight:500}
.check input{width:18px;height:18px;accent-color:var(--blue);cursor:pointer}
.f input,.f select{font-family:inherit;font-size:15px;border:1px solid var(--hair);border-radius:10px;padding:9px 11px;background:var(--sunk2);color:var(--ink)}
.f input::placeholder{color:var(--ink2)}
.f input:focus{outline:none;border-color:var(--accent);background:var(--card)}
.slider{accent-color:var(--blue2)}
.big-num{font-size:15px;font-weight:700;letter-spacing:-.02em}
.hint2{font-size:12px;color:var(--ink2);line-height:1.5;margin-top:12px;background:var(--sunk);border-radius:10px;padding:10px 12px}
.hint2.warn{background:var(--sunk);color:var(--amber)}
.hint2.ok{background:var(--tint-g);color:var(--green)}
.cta{width:100%;margin-top:16px;background:var(--blue);color:#fff;border:none;border-radius:12px;padding:13px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s}
.cta:disabled{opacity:.4;cursor:default}
.cta.dngr{background:var(--red)}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite;vertical-align:-1px;margin-inline-start:6px}
.spin.dark{border-color:#ccc;border-top-color:var(--ink2)}
@keyframes sp{to{transform:rotate(360deg)}}

/* changes list */
.changes{margin-top:20px}
.changes h3{font-size:13px;font-weight:600;color:var(--ink2);letter-spacing:.02em;margin-bottom:8px}
.crow{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:12px;padding:11px 14px;box-shadow:var(--shadow);margin-bottom:7px}
.crow .nm{font-size:14px;font-weight:600}
.crow .tag{font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px}
.crow .tag.sell{background:var(--tint-r);color:var(--red)}
.crow .tag.loan{background:var(--tint-b);color:var(--blue2)}
.crow .tag.sign{background:var(--tint-g);color:var(--green)}
.crow .tag.ext{background:var(--tint-b);color:var(--blue2)}
.crow .r{margin-inline-start:auto;display:flex;gap:8px;align-items:center}
.crow .undo{border:none;background:var(--raise);color:var(--ink2);border-radius:8px;padding:5px 10px;font-size:11.5px;cursor:pointer;font-family:inherit}
.done-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;align-items:center}
.done-chip{font-size:11px;background:var(--card);border:1px solid var(--hair);border-radius:20px;padding:4px 10px;color:var(--ink2)}
.done-chip b{color:var(--ink);font-weight:600}

/* done deals, split by direction */
.done-block{margin-top:22px}
.dd-head{display:flex;align-items:center;gap:9px;font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:10px}
.dd-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:560px){.dd-cols{grid-template-columns:1fr}}
.dd-col{background:var(--card);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
.dd-t{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  border-bottom:1px solid var(--hair)}
.dd-t.in{color:var(--green);background:var(--tint-g)}
.dd-t.out{color:var(--red);background:var(--tint-r)}
.dd-t span{font-weight:600;opacity:.75}
.dd-row{display:flex;align-items:baseline;gap:8px;padding:9px 14px;border-bottom:1px solid var(--hair);font-size:12.5px}
.dd-row:last-child{border-bottom:none}
.dd-n{font-weight:600;color:var(--ink);white-space:nowrap}
.dd-d{color:var(--ink2);font-size:11.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dd-f{margin-inline-start:auto;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;font-size:12px}
.dd-f.in{color:var(--green)}
.dd-f.out{color:var(--red)}
.dd-f.free{color:var(--ink2);font-weight:500;font-size:11px}
.dd-none{padding:14px;text-align:center;font-size:11.5px;color:var(--ink2)}
/* shared summary page */
.sum{padding:36px 20px 60px;max-width:640px}
.sum-head{text-align:center;margin-bottom:24px}
.sum-kicker{font-size:11px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.14em}
.sum h1{font-size:clamp(26px,5.5vw,34px);font-weight:700;letter-spacing:-.03em;margin:8px 0 0}
.verdict{display:inline-block;margin-top:12px;font-size:12.5px;font-weight:600;
  border:1px solid;border-radius:20px;padding:5px 14px}
.sum-meters{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:520px){.sum-meters{grid-template-columns:1fr}}
.sm{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:15px 17px;display:flex;flex-direction:column}
.sm-l{font-size:11.5px;color:var(--ink2);font-weight:500}
.sm-v{font-size:27px;font-weight:700;letter-spacing:-.03em;margin-top:2px;font-variant-numeric:tabular-nums}
.sm-n{font-size:11px;color:var(--ink2);margin-top:3px}

.sum-block{margin-top:26px}
.sum-block h2{font-size:14px;font-weight:700;letter-spacing:-.01em;margin:0}
.sum-note{font-size:12px;color:var(--ink2);margin-top:2px}
.sum-tbl{width:100%;border-collapse:collapse;margin-top:12px;background:var(--card);
  border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
.sum-tbl td{padding:11px 13px;border-bottom:1px solid var(--hair);font-size:13px;vertical-align:middle}
.sum-tbl tr:last-child td{border-bottom:none}
.sum-tbl .mv{width:44px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.sum-tbl .mv.in{color:var(--green)}
.sum-tbl .mv.out{color:var(--red)}
.sum-tbl .nm{font-weight:600;color:var(--ink)}
.sum-tbl .mut{color:var(--ink2);font-size:12px}
.sum-tbl .num{text-align:end;font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap}
.sum-tbl .num.saved{color:var(--green)}

.line{display:flex;gap:14px;margin-top:14px;align-items:flex-start}
.line-l{width:74px;flex-shrink:0;font-size:10.5px;font-weight:700;color:var(--ink2);
  text-transform:uppercase;letter-spacing:.05em;padding-top:7px}
.line-p{display:flex;flex-wrap:wrap;gap:6px;flex:1}
.sp{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--hair);
  border-radius:20px;padding:5px 11px;font-size:12.5px;font-weight:500;color:var(--ink);white-space:nowrap}
.sp i{font-style:normal;font-weight:700;font-size:11px;font-variant-numeric:tabular-nums}
.sp .star{color:var(--gold);font-size:10px}

.sum-pitch{margin-top:14px}
.sum-pitch .chip{cursor:default;pointer-events:none}
.sum-pitch .chip:hover{background:rgba(6,20,10,.5)}
.sum-cta{width:100%;margin-top:30px;border:none;border-radius:14px;padding:16px;
  background:linear-gradient(100deg,#0A0F1C 0%,#0F1C3D 38%,#1B54D6 100%);
  color:#fff;font-family:inherit;font-size:15.5px;font-weight:700;cursor:pointer;
  transition:transform .14s,filter .14s}
.sum-cta:hover{transform:translateY(-2px);filter:brightness(1.12)}
.sum-foot{margin-top:14px;font-size:11.5px;color:var(--ink2);text-align:center;line-height:1.5}

/* splash */
.splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#0A0E1A;padding:32px 20px 44px;overflow-y:auto;
  font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
/* the photo sits at its own size and dissolves into the background on every edge,
   so there's no hard cut and nothing gets upscaled into mush */
/* a round portrait: nothing gets cut off at an edge, and it fades softly into the dark */
.sp-photo{position:relative;width:280px;max-width:78vw;margin-bottom:20px;pointer-events:none}
.sp-photo img{width:100%;height:auto;display:block;
  image-rendering:pixelated;image-rendering:crisp-edges;
  -webkit-mask-image:linear-gradient(180deg,#000 78%,transparent 100%);
  mask-image:linear-gradient(180deg,#000 78%,transparent 100%)}
.sp-body{display:flex;flex-direction:column;align-items:center;text-align:center;
  padding:0 6px;position:relative;z-index:2}
.splash h1{font-size:clamp(28px,6.5vw,40px);font-weight:700;letter-spacing:-.035em;color:#fff;margin:0;line-height:1.1}
.splash p{color:#98A0B4;font-size:14.5px;line-height:1.65;max-width:42ch;margin:15px 0 0}
.sp-play{margin-top:30px;border:none;border-radius:30px;
  background:linear-gradient(100deg,#0A0F1C 0%,#0F1C3D 38%,#1B54D6 100%);
  color:#fff;padding:16px 66px;font-family:inherit;font-size:16.5px;font-weight:700;letter-spacing:.01em;
  cursor:pointer;transition:transform .14s,filter .14s}
.sp-play:hover{transform:translateY(-2px);filter:brightness(1.15)}
.sp-play:active{transform:translateY(0)}

/* the two rules */
.rules{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
@media(max-width:640px){.rules{grid-template-columns:1fr}}
.ru{display:flex;gap:10px;background:var(--card);border-radius:13px;box-shadow:var(--shadow);padding:13px 15px}
.ru-n{width:19px;height:19px;border-radius:50%;background:var(--blue);color:#fff;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.ru span:last-child{font-size:12px;color:var(--ink2);line-height:1.5}
.ru b{display:block;color:var(--ink);font-size:12.5px;font-weight:600;margin-bottom:2px}

/* method: splash link */
.sp-method{margin-top:20px;background:none;border:none;color:#7C8698;font-family:inherit;font-size:12.5px;
  cursor:pointer;padding:6px;text-decoration:underline;text-underline-offset:3px;text-decoration-color:#39415A;
  transition:color .15s}
.sp-method:hover{color:#C3CAD8}

/* method: in-game link */
.methodlink{width:100%;margin-top:10px;background:none;border:none;font-family:inherit;font-size:12px;
  color:var(--accent);cursor:pointer;padding:8px;text-align:center;font-weight:500;border-radius:9px;transition:background .15s}
.methodlink:hover{background:var(--tint-b)}

/* method: accordion */
.method{margin-top:16px;border-top:1px solid var(--hair)}
.acc{border-bottom:1px solid var(--hair)}
.acc-q{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;
  background:none;border:none;font-family:inherit;text-align:start;padding:14px 2px;cursor:pointer;
  font-size:13.5px;font-weight:600;color:var(--ink);transition:color .15s}
.acc-q:hover{color:var(--accent)}
.acc.on .acc-q{color:var(--accent)}
.acc-x{font-size:17px;color:var(--ink2);font-weight:400;flex-shrink:0;line-height:1}
.acc-a{padding:0 2px 16px}
.acc-a p{font-size:13px;line-height:1.65;color:var(--ink2);margin:0 0 10px}
.acc-a p:last-child{margin-bottom:0}
.acc-a b{color:var(--ink);font-weight:600}
.acc-a i{color:var(--ink2)}

.viewbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px;
  background:var(--tint-b);border:1px solid #C9DBF8;border-radius:12px;padding:10px 14px;font-size:12.5px;color:var(--blue)}
.viewbar.soft{background:var(--sunk);border-color:var(--hair);color:var(--ink2)}
.viewbar button{border:none;background:var(--blue);color:#fff;border-radius:20px;padding:6px 13px;
  font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap}
.viewbar.soft button{background:var(--hair);color:var(--ink)}

/* the share bar rides at the bottom the moment you've made a move */
.sharebar{position:fixed;left:0;right:0;bottom:0;z-index:70;padding:10px 14px calc(10px + env(safe-area-inset-bottom));
  background:color-mix(in srgb, var(--bg) 88%, transparent);backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);border-top:1px solid var(--hair)}
.sb-in{max-width:760px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
.sb-stat{font-size:12.5px;color:var(--ink2);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.sb-stat b{color:var(--ink);font-weight:700;font-variant-numeric:tabular-nums}
.sb-stat i{font-style:normal;opacity:.4;margin:0 2px}
.sb-idle{color:var(--ink2)}
.sb-btn{border:none;border-radius:11px;padding:11px 22px;font-family:inherit;font-size:14px;font-weight:600;
  color:#fff;cursor:pointer;white-space:nowrap;flex-shrink:0;
  background:linear-gradient(100deg,#0A0F1C 0%,#0F1C3D 38%,#1B54D6 100%);
  transition:transform .12s,filter .12s}
.sb-btn:hover{transform:translateY(-1px);filter:brightness(1.15)}

.sharebtn{width:100%;margin-top:12px;background:var(--card);border:1px solid var(--hair);border-radius:16px;
  padding:15px;font-family:inherit;cursor:pointer;box-shadow:var(--shadow);display:flex;flex-direction:column;
  align-items:center;gap:3px;transition:transform .12s,border-color .15s}
.sharebtn:hover{transform:translateY(-2px);border-color:var(--accent)}
.sb-main{font-size:14.5px;font-weight:600;color:var(--blue)}
.sb-sub{font-size:11.5px;color:var(--ink2)}

.share-card{margin-top:16px;background:linear-gradient(150deg,#0A2A6B,#1B54D6);border-radius:14px;padding:18px;color:#fff}
.sc-title{font-size:17px;font-weight:700;letter-spacing:-.02em}
.sc-stats{display:flex;gap:18px;margin-top:12px;flex-wrap:wrap}
.sc-stats span{display:flex;flex-direction:column;font-size:10.5px;color:rgba(255,255,255,.7)}
.sc-stats b{font-size:17px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums}
.src-tag{font-size:10.5px;font-weight:600;color:var(--green);background:var(--tint-g);border-radius:20px;padding:3px 9px}

.refresh{font-size:12px;font-family:inherit;border:1px solid var(--hair);background:var(--card);border-radius:20px;padding:5px 12px;cursor:pointer;color:var(--ink)}
.ftr{margin-top:26px;font-size:11.5px;color:var(--ink2);line-height:1.6;border-top:1px solid var(--hair);padding-top:14px}
@media(prefers-reduced-motion:reduce){.tfill,.node,.chip,.act{transition:none}.spin{animation-duration:2s}}

/* ============================================================
   8-BIT LAYER
   The pixel font is for headings and figures \u2014 the things you
   glance at. Everything you actually have to read stays in Inter,
   because a pixel font at 13px is a wall, not a design.
   ============================================================ */

/* the big title */
.splash h1{font-family:var(--pixel);font-size:clamp(22px,6.4vw,42px);line-height:1.55;
  letter-spacing:0;text-shadow:4px 4px 0 var(--blue)}
.top h1{font-family:var(--pixel);font-size:clamp(15px,3.4vw,22px);line-height:1.65;
  letter-spacing:0;text-shadow:2px 2px 0 var(--blue)}
.sum h1{font-family:var(--pixel);font-size:clamp(15px,3.6vw,22px);line-height:1.65;
  letter-spacing:0;text-shadow:2px 2px 0 var(--blue)}

/* the two figures that matter */
.meter .val{font-family:var(--pixel);font-size:22px;letter-spacing:0;line-height:1.3}
.sm-v{font-family:var(--pixel);font-size:22px;letter-spacing:0;line-height:1.3}

/* section headings, small and blocky */
.sec>h2,.sum-block h2,.card h2{font-family:var(--pixel);font-size:11px;line-height:1.7;letter-spacing:0}
.changes h3{font-family:var(--pixel);font-size:9px;line-height:1.7;letter-spacing:0}
.dd-t{font-family:var(--pixel);font-size:8px;letter-spacing:0;line-height:1.7}
.sum-kicker{font-family:var(--pixel);font-size:8px;letter-spacing:0}
.verdict{font-family:var(--pixel);font-size:8.5px;letter-spacing:0;padding:9px 15px;line-height:1.6}

/* buttons read as buttons in an old game: square, with a hard shadow */
.sp-play{font-family:var(--pixel);font-size:13px;letter-spacing:0;border-radius:0;
  padding:18px 44px;box-shadow:5px 5px 0 #061027;transition:transform .08s,box-shadow .08s}
.sp-play:hover{transform:translate(2px,2px);box-shadow:3px 3px 0 #061027;filter:none}
.sp-play:active{transform:translate(5px,5px);box-shadow:0 0 0 #061027}

.sb-btn{font-family:var(--pixel);font-size:10px;letter-spacing:0;border-radius:0;padding:14px 20px;
  box-shadow:4px 4px 0 #061027;transition:transform .08s,box-shadow .08s}
.sb-btn:hover{transform:translate(2px,2px);box-shadow:2px 2px 0 #061027;filter:none}

.sum-cta{font-family:var(--pixel);font-size:12px;letter-spacing:0;border-radius:0;padding:20px;
  box-shadow:5px 5px 0 #061027;transition:transform .08s,box-shadow .08s}
.sum-cta:hover{transform:translate(2px,2px);box-shadow:3px 3px 0 #061027;filter:none}

/* the action tiles get a hard edge and a hard shadow */
.act{border-radius:0;border:2px solid var(--hair);box-shadow:4px 4px 0 rgba(0,0,0,.5);
  transition:transform .08s,box-shadow .08s,border-color .12s}
.act:hover{transform:translate(2px,2px);box-shadow:2px 2px 0 rgba(0,0,0,.5);border-color:var(--blue2)}
.act .t{font-family:var(--pixel);font-size:9px;line-height:1.7;letter-spacing:0}
.act .ico{border-radius:0;image-rendering:pixelated}

/* player chips: little sprites */
/* the starter sits proud; the backup is recessed. same tile, different volume. */
.chip.start{background:rgba(6,20,10,.82);border:2px solid rgba(255,255,255,.32);
  box-shadow:2px 2px 0 rgba(0,0,0,.6);min-height:38px}
.chip.sub{background:rgba(6,20,10,.42);border:1px dashed rgba(255,255,255,.18);
  box-shadow:1px 1px 0 rgba(0,0,0,.35)}
.chip.sub:hover{background:rgba(6,20,10,.72);border-color:rgba(255,255,255,.45)}
.chip .amt{font-family:var(--pixel);font-size:7px;letter-spacing:0;line-height:1.4;margin-top:1px}
.chip.sub .amt{font-size:7px}

/* the pitch, squared off */
.pitch-card{border-radius:0;border:3px solid #1c5230;padding:6px}
.pitch{border-radius:0}

/* meters and cards lose their softness */
.meter{border-radius:0;border:2px solid var(--hair)}
.track{border-radius:0;border:1px solid var(--hair);height:14px;background:var(--bg)}
.tfill{border-radius:0}
.cap{border-radius:0;width:3px}
.ru{border-radius:0;border:2px solid var(--hair)}
.ru-n{border-radius:0;font-family:var(--pixel);font-size:7px}
.sm{border-radius:0;border:2px solid var(--hair)}
.dd-col{border-radius:0;border:2px solid var(--hair)}
.crow{border-radius:0;border:1px solid var(--hair)}
.sharebar{border-top:2px solid var(--hair)}

/* modals keep a soft edge \u2014 a sheet with hard corners feels broken, not retro */
.sheet{border-radius:14px}

/* the theme toggle as a little pixel button */
.themebtn{border-radius:0;border:2px solid var(--hair);box-shadow:3px 3px 0 rgba(0,0,0,.5)}
.themebtn:hover{transform:translate(1px,1px);box-shadow:2px 2px 0 rgba(0,0,0,.5)}

/* scanlines: a whisper, not a filter */
.app::before{content:"";position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.035;
  background:repeating-linear-gradient(0deg,#fff 0 1px,transparent 1px 3px)}
.light .app::before{opacity:.02;background:repeating-linear-gradient(0deg,#000 0 1px,transparent 1px 3px)}

/* pixel-art rendering wherever there's art */
.sp-photo img{image-rendering:pixelated}

/* a starter's chip should feel like the man in possession */

/* the meter fill in hard steps, like a health bar rather than a gradient */
.tfill{background-image:repeating-linear-gradient(90deg,
  rgba(255,255,255,.14) 0 2px, transparent 2px 6px)}

/* the number and its bar belong together */
.meter .top-row{align-items:center}
.meter .cnote{margin-top:9px}

/* the kicker on the splash, like a title card */
.hdr .kick,.sum-kicker{font-family:var(--pixel)}

/* focus rings should look like a selection cursor, not a browser default */
*:focus-visible{outline:2px solid var(--blue2);outline-offset:2px;border-radius:0}

/* the star on a signing \u2014 make it read as a pickup */
.chip .flag.star,.sp .star{color:var(--amber);text-shadow:1px 1px 0 rgba(0,0,0,.6)}

/* the share bar sits on a hard edge */
.sb-stat b{font-family:var(--pixel);font-size:10px;letter-spacing:0}

/* meter labels stay legible \u2014 they're read, not glanced at */
.meter .lbl,.sm-l{font-family:'Inter',sans-serif}

/* a subtle CRT vignette, barely there */
.app::after{content:"";position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse at center, transparent 62%, rgba(0,0,0,.28) 100%)}
.light .app::after{display:none}

@media(max-width:560px){
  .splash h1{font-size:22px;line-height:1.6}
  .top h1,.sum h1{font-size:15px;line-height:1.7}
  .meter .val,.sm-v{font-size:17px}
  .sp-play{font-size:12px;padding:17px 34px}
  .sb-btn{font-size:9px;padding:13px 15px}
  .sec>h2,.sum-block h2,.card h2{font-size:9.5px}
  .act .t{font-size:8px}
  /* the pitch needs the most room on the smallest screens */
  .grid{padding:20px 1.5% 16px;gap:11px 1%}
  .chip{max-width:70px;min-height:32px;padding:3px 4px}
  .chip.start{min-height:35px}
  .chip .nm{font-size:8.5px}
  .chip.start .nm,.chip.sub .nm{font-size:8.5px}
  .chip .amt{font-size:6px}
  .chip.start .amt,.chip.sub .amt{font-size:6px}
}
@media(max-width:480px){
  .grid{padding:18px 1.5% 14px;gap:10px 1%}
  /* the tile gets tighter, the type does not \u2014 a name you can't read is worse
     than a tile that's a few pixels narrower */
  .chip{max-width:66px;min-height:31px;padding:3px 3px}
  .chip.start{min-height:34px}
  .chip.start .nm,.chip.sub .nm{font-size:8.5px}
  .chip.start .amt,.chip.sub .amt{font-size:6px}
}

/* ---- 8-bit: the share sheet and the shared page ---- */
.dots{font-family:'Inter',sans-serif;font-size:.62em;letter-spacing:3px;text-shadow:none;
  display:inline-block;margin-inline-start:10px;vertical-align:middle}
.splash h1 .dots{font-size:.55em}

.sheet h3{font-family:var(--pixel);font-size:11px;line-height:1.75;letter-spacing:0}
.close{border-radius:0;border:2px solid var(--hair)}
.f input,.f select,.searchbar input,.posmove select{border-radius:0}
.hint2,.picked,.talk,.posmove,.pop-note,.dropdown,.hits{border-radius:0}
.pop-badge,.talk-type{border-radius:0}

.share-card{border-radius:0;border:3px solid #06122E;box-shadow:5px 5px 0 rgba(0,0,0,.5);
  position:relative;overflow:hidden}
.share-card::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.13;
  background:repeating-linear-gradient(0deg,#fff 0 1px,transparent 1px 3px)}
.sc-title{font-family:var(--pixel);font-size:11px;line-height:1.7;letter-spacing:0;
  text-shadow:2px 2px 0 #06122E;position:relative;z-index:1}
.sc-stats{position:relative;z-index:1;gap:16px}
.sc-stats b{font-family:var(--pixel);font-size:11px;letter-spacing:0;line-height:1.5;margin-bottom:3px}
.share-sheet .cta{border-radius:0;font-family:var(--pixel);font-size:9px;letter-spacing:0;
  line-height:1.6;padding:15px 10px;box-shadow:4px 4px 0 rgba(0,0,0,.45);
  transition:transform .08s,box-shadow .08s}
.share-sheet .cta:hover{transform:translate(2px,2px);box-shadow:2px 2px 0 rgba(0,0,0,.45)}
.share-sheet .cta:active{transform:translate(4px,4px);box-shadow:0 0 0 rgba(0,0,0,.45)}

/* the shared page: in/out, then the pitch, then the full books */
.yours{font-family:var(--pixel);font-size:6.5px;letter-spacing:0;color:var(--amber);
  margin-inline-start:6px;vertical-align:1px}
.sum-tblbox{margin-top:12px;background:var(--card);border:2px solid var(--hair);
  box-shadow:var(--shadow);padding:2px 12px 8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl.static th{cursor:default}
.tbl.static th:hover{color:var(--ink2)}
.sum-tbl{border-radius:0;border:2px solid var(--hair)}
.sum .dd-row{padding:9px 12px}
@media(max-width:560px){
  .sheet h3{font-size:9.5px}
  .sc-title,.sc-stats b{font-size:9.5px}
  .share-sheet .cta{font-size:8px;padding:14px 8px}
  .sum-tblbox{padding:2px 8px 8px}
}

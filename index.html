@import url('https://rsms.me/inter/inter.css');
:root{
  --bg:#F5F5F7; --card:#FFFFFF; --ink:#1D1D1F; --ink2:#6E6E73; --hair:#E3E3E6;
  --blue:#0A2A6B; --blue2:#1B54D6; --accent:#0071E3; --grass:#2E7D46;
  --red:#E5484D; --amber:#E8A93C; --green:#2F9E5B;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.06);
}
*{box-sizing:border-box}
.app{font-family:'Inter',-apple-system,sans-serif;font-feature-settings:'cv11','ss01';background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:48px}
.app h1,.app h2,.app h3{margin:0;font-weight:600;letter-spacing:-.02em}
.wrap{max-width:760px;margin:0 auto;padding:0 20px}

.top{text-align:center;padding:36px 0 12px}
.top .badge{width:34px;height:34px;border-radius:9px;background:var(--blue);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;letter-spacing:-.04em;margin-bottom:14px}
.top h1{font-size:clamp(28px,5vw,40px);font-weight:700;letter-spacing:-.035em}
.top p{color:var(--ink2);font-size:14px;line-height:1.5;max-width:44ch;margin:8px auto 0}

/* meters */
.board{background:var(--bg);padding:12px 0;margin-top:14px;border-bottom:1px solid var(--hair)}
.meters{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:520px){.meters{grid-template-columns:1fr}}
.meter{background:var(--card);border-radius:16px;padding:13px 16px;box-shadow:var(--shadow)}
.meter .top-row{display:flex;justify-content:space-between;align-items:baseline}
.meter .lbl{font-size:12px;color:var(--ink2);font-weight:500}
.meter .val{font-size:26px;font-weight:700;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
.meter .val.bad{color:var(--red)}
.track{height:6px;border-radius:3px;background:#EBEBED;overflow:hidden;margin-top:10px;position:relative}
.tfill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.22,.7,.28,1),background .3s}
.cap{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--ink);opacity:.42;border-radius:2px}
.meter .cnote{font-size:11.5px;color:var(--ink2);margin-top:8px}
.meter .cnote.bad{color:var(--red)}

/* segmented toggle */
.seg{display:inline-flex;background:#E9E9EB;border-radius:9px;padding:2px;gap:2px}
.seg button{font-family:inherit;font-size:12px;font-weight:500;border:none;background:none;color:var(--ink2);padding:4px 12px;border-radius:7px;cursor:pointer;transition:all .15s}
.seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}

/* pitch */
.pitch-card{margin:14px auto 0;max-width:696px;background:linear-gradient(160deg,#2f8049,#276b3d);border-radius:22px;padding:8px;box-shadow:var(--shadow)}
.pitch{position:relative;width:100%;aspect-ratio:10/11.2;max-width:680px;margin:0 auto;border-radius:16px;overflow:visible;
  background:repeating-linear-gradient(0deg,rgba(255,255,255,.028) 0 8.33%,rgba(0,0,0,.028) 8.33% 16.66%)}
.pitch svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.grid{position:absolute;inset:0;display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:auto auto auto auto;align-content:space-evenly;padding:22px 4% 16px;gap:12px 3%}
.cell{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:4px;min-width:0;overflow:visible}
.node{display:contents}
.chip{position:relative;display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer;touch-action:manipulation;user-select:none;
  background:rgba(6,20,10,.5);border-radius:7px;padding:4px 7px;width:max-content;max-width:none;
  transition:transform .12s,background .15s;white-space:nowrap;backdrop-filter:blur(3px);box-shadow:0 1px 3px rgba(0,0,0,.22);text-align:center}
.chip:hover{background:rgba(6,20,10,.66)}
.chip:active{cursor:grabbing}
.chip.start{padding:5px 9px;background:rgba(6,20,10,.58)}
.chip.sub{padding:3px 6px;background:rgba(6,20,10,.4)}
.chip.sub:hover{background:rgba(6,20,10,.56)}
.chip.drag{opacity:.4}
.chip .nm{font-weight:600;line-height:1.1;letter-spacing:-.01em;color:#fff;white-space:nowrap}
.chip.start .nm{font-size:10.5px}
.chip.sub .nm{font-size:8.5px;color:rgba(255,255,255,.92)}
.chip .amt{font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.chip.start .amt{font-size:9.5px}
.chip.sub .amt{font-size:7.5px}
.chip .lock{font-size:8px;opacity:.85}
.chip .flag{font-weight:700;margin-inline-end:2px;font-size:.92em}
.chip .flag.star{color:var(--gold)}
.chip .flag.out{color:#FF8A5B}
.chip .flag.rum{color:#7FB2FF;font-size:1.1em;line-height:0}
.subwrap{display:none}
.bench-strip{display:none}

/* player info popover \u2192 action sheet */
.pop-sheet{max-width:420px}
.pop-head2{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-top:2px}
.pop-name2{font-size:19px;font-weight:700;letter-spacing:-.02em}
.pop-pos2{font-size:12px;color:var(--ink2);font-weight:500}
.pop-status{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.pop-badge{font-size:11px;font-weight:600;padding:2px 9px;border:1px solid;border-radius:20px}
.pop-rows{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.pop-rows>div{display:flex;justify-content:space-between;align-items:baseline;font-size:13px}
.pop-rows span{color:var(--ink2)}
.pop-rows b{color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums}
.pop-note{margin-top:12px;font-size:12px;line-height:1.45;color:var(--ink2);background:#F5F5F7;border-radius:10px;padding:9px 11px}

/* tappable meters + breakdown tables */
.meter.tappable{width:100%;text-align:inherit;border:none;font-family:inherit;cursor:pointer;transition:transform .12s,box-shadow .12s}
.meter.tappable:hover{transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,.08),0 10px 28px rgba(0,0,0,.08)}
.meter.tappable:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.cnote{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.seemore{color:var(--accent);font-weight:600;font-size:11px;white-space:nowrap}
.sheet.wide{max-width:660px}
.tbl-wrap{margin-top:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.tbl th{text-align:start;font-size:10.5px;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:.04em;
  padding:7px 8px;border-bottom:1px solid var(--hair);cursor:pointer;white-space:nowrap;user-select:none}
.tbl th:hover{color:var(--accent)}
.tbl th.on{color:var(--accent)}
.tbl td{padding:8px;border-bottom:1px solid #F0F0F2;white-space:nowrap}
.tbl tr.dim{opacity:.45}
.tbl .pname{font-weight:600;color:var(--ink)}
.tbl .mut{color:var(--ink2)}
.tbl .num{text-align:end;font-variant-numeric:tabular-nums}
.tbl .strong{font-weight:700}
.tbl tfoot td{border-bottom:none;border-top:2px solid var(--hair);font-weight:700;color:var(--ink);padding-top:10px}
.outtag{font-size:9px;font-weight:600;color:var(--red);background:#FDEBEC;border-radius:20px;padding:1px 6px;margin-inline-start:5px}
.tier{font-size:9px;font-weight:700;border-radius:20px;padding:1px 6px;margin-inline-start:6px;letter-spacing:.02em}
.tier.u23{background:#EAF1FD;color:var(--blue2)}
.tier.primavera{background:#F3EEFB;color:#6E43C4}

/* live sync bar */
.syncbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:20px;
  background:var(--card);border:1px solid var(--hair);border-radius:12px;padding:11px 14px;box-shadow:var(--shadow)}
.syncbar.baseline{border-color:#F2D9B0;background:#FEFBF5}
.sync-left{display:flex;align-items:center;gap:10px;min-width:0}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--ink2)}
.sync-dot.loading{background:var(--accent);animation:pulse 1.2s ease-in-out infinite}
.sync-dot.done{background:var(--green);box-shadow:0 0 0 3px rgba(47,158,91,.15)}
.sync-dot.baseline{background:var(--amber)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.syncbar b{font-size:12.5px;font-weight:600;display:block}
.sync-sub{font-size:11px;color:var(--ink2);display:block;margin-top:1px}
.sync-log{margin-top:8px;display:flex;flex-direction:column;gap:4px}
.sync-line{font-size:11.5px;padding:6px 12px;border-radius:8px;background:#F5F5F7;color:var(--ink2)}
.sync-line span{font-weight:700;margin-inline-end:6px}
.sync-line.in{background:#EAF7EF;color:#1C6B3A}
.sync-line.out{background:#FDEBEC;color:#9C2A2E}
@media(prefers-reduced-motion:reduce){.sync-dot.loading{animation:none}}
.dropdown{margin-top:12px;border:1px solid var(--hair);border-radius:12px;overflow:hidden;background:#FAFAFB}
.dd-head{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:none;border:none;font-family:inherit;text-align:start;padding:12px 14px;cursor:pointer;transition:background .15s}
.dd-head:hover{background:#F2F4F8}
.dd-title{display:block;font-size:13.5px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
.dd-sub{display:block;font-size:11px;color:var(--ink2);margin-top:2px}
.dd-arrow{font-size:20px;color:var(--ink2);transform:rotate(90deg);transition:transform .2s;line-height:1}
.dd-arrow.open{transform:rotate(-90deg)}
.dd-body{padding:0 10px 10px;display:flex;flex-direction:column;gap:6px;background:#fff;border-top:1px solid var(--hair)}
.dd-tab{font-size:10.5px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.05em;padding:12px 4px 4px}
.dd-tab.hot{color:var(--accent)}
.talk{margin-top:14px;background:#F7F8FA;border:1px solid var(--hair);border-radius:12px;padding:11px 13px}
.talk-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
.talk-title{font-size:11px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.05em}
.talk-type{font-size:10.5px;font-weight:600;padding:2px 9px;border:1px solid;border-radius:20px}
.talk-price{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;margin-top:9px}
.talk-price span{color:var(--ink2)}
.talk-price b{font-weight:700;font-variant-numeric:tabular-nums}
.club-tag{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;background:#fff;border:1px solid var(--hair);color:var(--ink)}
.talk-body{margin-top:9px;font-size:12px;line-height:1.5;color:var(--ink2)}
.pop-hint{margin-top:9px;font-size:11px;color:var(--ink2);opacity:.8;text-align:center}
.pop-actions{display:flex;gap:7px;margin-top:14px}
.pop-actions .cta{flex:1;padding:12px 8px;font-size:14px;white-space:nowrap}
.pop-actions .cta{margin-top:0}
.cta.ghost2{background:#EDEDF0;color:var(--ink)}

/* action bar */
.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px;margin-bottom:2px}
@media(max-width:520px){.actions{grid-template-columns:1fr}}
.act{background:var(--card);border:none;border-radius:16px;padding:16px 14px;text-align:right;cursor:pointer;box-shadow:var(--shadow);transition:transform .12s;font-family:inherit}
.act:hover{transform:translateY(-2px)}
.act:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.act .ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;margin-bottom:10px}
.act .t{font-size:14px;font-weight:600;letter-spacing:-.01em}
.act .d{font-size:11.5px;color:var(--ink2);margin-top:3px;line-height:1.35}

/* sheet / modal */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.32);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:560px){.scrim{align-items:center}}
.sheet{background:var(--card);width:100%;max-width:520px;max-height:88vh;overflow-y:auto;border-radius:22px 22px 0 0;padding:20px;box-shadow:0 -10px 40px rgba(0,0,0,.2)}
@media(min-width:560px){.sheet{border-radius:22px}}
.sheet h3{font-size:19px;font-weight:700;letter-spacing:-.02em}
.sheet .sub{font-size:12.5px;color:var(--ink2);margin-top:3px}
.close{float:left;border:none;background:#EBEBED;width:28px;height:28px;border-radius:50%;font-size:15px;color:var(--ink2);cursor:pointer;line-height:1}
.plist{margin-top:14px;display:flex;flex-direction:column;gap:7px}
.searchbar{display:flex;gap:8px;margin-bottom:4px}
.searchbar input{flex:1;font-family:inherit;font-size:14px;border:1px solid var(--hair);border-radius:10px;padding:10px 12px;background:#FAFAFB;color:var(--ink)}
.searchbar input:focus{outline:none;border-color:var(--accent);background:#fff}
.btn-search{font-family:inherit;font-size:13px;font-weight:600;border:none;border-radius:10px;background:var(--blue);color:#fff;padding:0 16px;cursor:pointer;min-width:74px;display:flex;align-items:center;justify-content:center}
.btn-search:disabled{opacity:.5;cursor:default}
.listlabel{font-size:11px;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:.04em;margin:6px 0 2px}
.prow{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--hair);border-radius:12px;cursor:pointer;transition:border-color .15s,background .15s;font-family:inherit;text-align:right;width:100%;background:none}
.prow:hover{border-color:var(--accent);background:#F5F9FF}
.prow .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.prow .nm{font-size:14px;font-weight:600}
.prow .meta{font-size:11px;color:var(--ink2)}
.prow .r{margin-inline-start:auto;font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}
.pill{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;background:#F0F0F2;color:var(--ink2)}
.clubs{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.club{font-size:11.5px;font-weight:500;padding:5px 11px;border-radius:20px;border:1px solid var(--hair);background:#fff;cursor:pointer;transition:all .15s;font-family:inherit;color:var(--ink)}
.club.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.fieldrow{display:flex;gap:12px;margin-top:14px;flex-wrap:wrap}
.f{display:flex;flex-direction:column;gap:5px;flex:1;min-width:120px}
.f label{font-size:11px;color:var(--ink2);font-weight:500}
.freerow{margin-top:12px}
.check{display:flex;align-items:center;gap:9px;cursor:pointer;font-size:13.5px;color:var(--ink);font-weight:500}
.check input{width:18px;height:18px;accent-color:var(--blue);cursor:pointer}
.f input,.f select{font-family:inherit;font-size:15px;border:1px solid var(--hair);border-radius:10px;padding:9px 11px;background:#FAFAFB;color:var(--ink)}
.f input:focus{outline:none;border-color:var(--accent);background:#fff}
.slider{accent-color:var(--blue2)}
.big-num{font-size:15px;font-weight:700;letter-spacing:-.02em}
.hint2{font-size:12px;color:var(--ink2);line-height:1.5;margin-top:12px;background:#F5F5F7;border-radius:10px;padding:10px 12px}
.hint2.warn{background:#FDF4E3;color:#8A6410}
.hint2.ok{background:#EAF7EF;color:#1C6B3A}
.cta{width:100%;margin-top:16px;background:var(--blue);color:#fff;border:none;border-radius:12px;padding:13px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s}
.cta:disabled{opacity:.4;cursor:default}
.cta.dngr{background:var(--red)}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite;vertical-align:-1px;margin-inline-start:6px}
.spin.dark{border-color:#ccc;border-top-color:var(--ink2)}
@keyframes sp{to{transform:rotate(360deg)}}

/* changes list */
.changes{margin-top:20px}
.changes h3{font-size:13px;font-weight:600;color:var(--ink2);letter-spacing:.02em;margin-bottom:8px}
.crow{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:12px;padding:11px 14px;box-shadow:var(--shadow);margin-bottom:7px}
.crow .nm{font-size:14px;font-weight:600}
.crow .tag{font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px}
.crow .tag.sell{background:#FDEBEC;color:var(--red)}
.crow .tag.loan{background:#EAF1FD;color:var(--blue2)}
.crow .tag.sign{background:#EAF7EF;color:var(--green)}
.crow .tag.ext{background:#F3EEFB;color:#6E43C4}
.crow .r{margin-inline-start:auto;display:flex;gap:8px;align-items:center}
.crow .undo{border:none;background:#F0F0F2;color:var(--ink2);border-radius:8px;padding:5px 10px;font-size:11.5px;cursor:pointer;font-family:inherit}
.done-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;align-items:center}
.done-chip{font-size:11px;background:#fff;border:1px solid var(--hair);border-radius:20px;padding:4px 10px;color:var(--ink2)}
.done-chip b{color:var(--ink);font-weight:600}
/* splash */
.splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#0A0E1A;padding:32px 20px 44px;overflow-y:auto;
  font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
/* the photo sits at its own size and dissolves into the background on every edge,
   so there's no hard cut and nothing gets upscaled into mush */
/* a round portrait: nothing gets cut off at an edge, and it fades softly into the dark */
.sp-photo{position:relative;width:224px;height:224px;border-radius:50%;overflow:hidden;
  margin-bottom:26px;pointer-events:none;
  box-shadow:0 0 0 1px rgba(255,255,255,.1), 0 20px 60px -14px rgba(0,0,0,.85)}
.sp-photo img{width:100%;height:100%;object-fit:cover;object-position:center center;display:block}
.sp-photo::after{content:"";position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 50% 48%, transparent 72%, rgba(10,14,26,.35) 90%, rgba(10,14,26,.7) 100%)}
.sp-body{display:flex;flex-direction:column;align-items:center;text-align:center;
  padding:0 6px;position:relative;z-index:2}
.splash h1{font-size:clamp(28px,6.5vw,40px);font-weight:700;letter-spacing:-.035em;color:#fff;margin:0;line-height:1.1}
.splash p{color:#98A0B4;font-size:14.5px;line-height:1.65;max-width:42ch;margin:15px 0 0}
.sp-play{margin-top:30px;border:none;border-radius:30px;
  background:linear-gradient(100deg,#0A0F1C 0%,#0F1C3D 38%,#1B54D6 100%);
  color:#fff;padding:16px 66px;font-family:inherit;font-size:16.5px;font-weight:700;letter-spacing:.01em;
  cursor:pointer;transition:transform .14s,filter .14s}
.sp-play:hover{transform:translateY(-2px);filter:brightness(1.15)}
.sp-play:active{transform:translateY(0)}

/* the two rules */
.rules{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
@media(max-width:640px){.rules{grid-template-columns:1fr}}
.ru{display:flex;gap:10px;background:var(--card);border-radius:13px;box-shadow:var(--shadow);padding:13px 15px}
.ru-n{width:19px;height:19px;border-radius:50%;background:var(--blue);color:#fff;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.ru span:last-child{font-size:12px;color:var(--ink2);line-height:1.5}
.ru b{display:block;color:var(--ink);font-size:12.5px;font-weight:600;margin-bottom:2px}

/* method: splash link */
.sp-method{margin-top:20px;background:none;border:none;color:#7C8698;font-family:inherit;font-size:12.5px;
  cursor:pointer;padding:6px;text-decoration:underline;text-underline-offset:3px;text-decoration-color:#39415A;
  transition:color .15s}
.sp-method:hover{color:#C3CAD8}

/* method: in-game link */
.methodlink{width:100%;margin-top:10px;background:none;border:none;font-family:inherit;font-size:12px;
  color:var(--accent);cursor:pointer;padding:8px;text-align:center;font-weight:500;border-radius:9px;transition:background .15s}
.methodlink:hover{background:#EDF4FE}

/* method: accordion */
.method{margin-top:16px;border-top:1px solid var(--hair)}
.acc{border-bottom:1px solid var(--hair)}
.acc-q{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;
  background:none;border:none;font-family:inherit;text-align:start;padding:14px 2px;cursor:pointer;
  font-size:13.5px;font-weight:600;color:var(--ink);transition:color .15s}
.acc-q:hover{color:var(--accent)}
.acc.on .acc-q{color:var(--accent)}
.acc-x{font-size:17px;color:var(--ink2);font-weight:400;flex-shrink:0;line-height:1}
.acc-a{padding:0 2px 16px}
.acc-a p{font-size:13px;line-height:1.65;color:var(--ink2);margin:0 0 10px}
.acc-a p:last-child{margin-bottom:0}
.acc-a b{color:var(--ink);font-weight:600}
.acc-a i{color:var(--ink2)}

.viewbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px;
  background:#EAF1FD;border:1px solid #C9DBF8;border-radius:12px;padding:10px 14px;font-size:12.5px;color:var(--blue)}
.viewbar.soft{background:#F5F5F7;border-color:var(--hair);color:var(--ink2)}
.viewbar button{border:none;background:var(--blue);color:#fff;border-radius:20px;padding:6px 13px;
  font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap}
.viewbar.soft button{background:#E3E3E6;color:var(--ink)}

.sharebtn{width:100%;margin-top:12px;background:var(--card);border:1px solid var(--hair);border-radius:16px;
  padding:15px;font-family:inherit;cursor:pointer;box-shadow:var(--shadow);display:flex;flex-direction:column;
  align-items:center;gap:3px;transition:transform .12s,border-color .15s}
.sharebtn:hover{transform:translateY(-2px);border-color:var(--accent)}
.sb-main{font-size:14.5px;font-weight:600;color:var(--blue)}
.sb-sub{font-size:11.5px;color:var(--ink2)}

.share-card{margin-top:16px;background:linear-gradient(150deg,#0A2A6B,#1B54D6);border-radius:14px;padding:18px;color:#fff}
.sc-title{font-size:17px;font-weight:700;letter-spacing:-.02em}
.sc-stats{display:flex;gap:18px;margin-top:12px;flex-wrap:wrap}
.sc-stats span{display:flex;flex-direction:column;font-size:10.5px;color:rgba(255,255,255,.7)}
.sc-stats b{font-size:17px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums}
.src-tag{font-size:10.5px;font-weight:600;color:var(--green);background:#EAF7EF;border-radius:20px;padding:3px 9px}

.refresh{font-size:12px;font-family:inherit;border:1px solid var(--hair);background:#fff;border-radius:20px;padding:5px 12px;cursor:pointer;color:var(--ink)}
.ftr{margin-top:26px;font-size:11.5px;color:var(--ink2);line-height:1.6;border-top:1px solid var(--hair);padding-top:14px}
@media(prefers-reduced-motion:reduce){.tfill,.node,.chip,.act{transition:none}.spin{animation-duration:2s}}
@media(max-width:480px){
  .grid{padding:16px 2% 12px;gap:9px 1.5%}
  .chip.start{padding:4px 6px}
  .chip.start .nm{font-size:9.5px}
  .chip.start .amt{font-size:8.5px}
  .chip.sub .nm{font-size:8px}
  .chip.sub .amt{font-size:7px}
}
